# HomeOps platform API: the XLabRun composite (LabRun claim) and the Composition that turns a claim
# into an isolated, disposable run namespace with a ResourceQuota, LimitRange, and default-deny
# NetworkPolicy. Also the broker ServiceAccount/RBAC that the run-broker uses to create claims.
#
# Sync wave -2: after Crossplane core (-4) and the provider/function/config (-3) so the composition
# pipeline can reference them. The XLabRun API is served once the XRD is Established.
name: homeops-platform
namespace: homeops
project: infrastructure
syncWave: "-2"
repoURL: https://github.com/isaacwallace123/homelab-k8s.git
targetRevision: main
appPath: manifests/infra/homeops-platform
