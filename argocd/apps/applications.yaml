# Infisical Dashboard
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
    chart: infisical-standalone
    targetRevision: 1.7.2
    helm:
      values: |
        infisical:
          kubeSecretRef: "infisical-secrets"
        ingress:
          enabled: false
        ingress-nginx:
          enabled: false
        postgresql:
          enabled: true
          auth:
            existingSecret: infisical-db-secrets
          primary:
            persistence:
              enabled: true
              storageClass: local-path
              size: 8Gi
        redis:
          enabled: true
          master:
            persistence:
              enabled: true
              storageClass: local-path
              size: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Traefik
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.traefik.io/traefik
    chart: traefik
    targetRevision: "*"
    helm:
      values: |
        service:
          annotations:
            metallb.io/loadBalancerIPs: "192.168.0.245"
        providers:
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: true
          kubernetesIngress:
            enabled: true
        ingressClass:
          enabled: true
          isDefaultClass: true
        ingressRoute:
          dashboard:
            enabled: false
        api:
          dashboard: true
        ports:
          web:
            port: 8000
            exposedPort: 80
          websecure:
            port: 8443
            exposedPort: 443
  destination:
    server: https://kubernetes.default.svc
    namespace: networking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
