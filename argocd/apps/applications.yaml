# Portfolio
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: frontend=ghcr.io/isaacwallace123/portfolio-frontend,infra=ghcr.io/isaacwallace123/portfolio-infra
    argocd-image-updater.argoproj.io/frontend.update-strategy: digest
    argocd-image-updater.argoproj.io/infra.update-strategy: digest
    argocd-image-updater.argoproj.io/frontend.pull-secret: pullsecret:argocd/ghcr-pull-secret
    argocd-image-updater.argoproj.io/infra.pull-secret: pullsecret:argocd/ghcr-pull-secret
spec:
  project: default
  source:
    repoURL: https://github.com/isaacwallace123/homelab-k8s.git
    targetRevision: main
    path: apps/portfolio
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
