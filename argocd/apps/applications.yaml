# Traefik
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.traefik.io/traefik
    chart: traefik
    targetRevision: "*"
    helm:
      values: |
        service:
          annotations:
            metallb.io/loadBalancerIPs: "192.168.0.245"
        providers:
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: true
          kubernetesIngress:
            enabled: true
        ingressClass:
          enabled: true
          isDefaultClass: true
        ingressRoute:
          dashboard:
            enabled: false
        api:
          dashboard: true
        metrics:
          prometheus:
            entryPoint: metrics
        ports:
          web:
            port: 8000
            exposedPort: 80
          websecure:
            port: 8443
            exposedPort: 443
          metrics:
            port: 9000
            expose:
              default: false
  destination:
    server: https://kubernetes.default.svc
    namespace: networking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Node Feature Discovery (NFD)
# Scans your Proxmox nodes and adds labels like "intel.feature.node.kubernetes.io/gpu=true"
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/node-feature-discovery/charts
    targetRevision: 0.17.2
    chart: node-feature-discovery
    helm:
      values: |
        master:
          extraLabelNs: ["intel.feature.node.kubernetes.io"]
  destination:
    server: https://kubernetes.default.svc
    namespace: node-feature-discovery
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# Intel GPU Device Plugin
# Advertises 'gpu.intel.com/xe' for your B580 and 'gpu.intel.com/i915' for your A380.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: intel-gpu-plugin
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://intel.github.io/helm-charts/
    targetRevision: 0.35.0
    chart: intel-device-plugins-gpu
    helm:
      values: |
        sharedDevNum: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # The GpuDevicePlugin CRD and its CR land in the same sync wave; skip dry-run
      # validation so ArgoCD doesn't reject the CR before the CRD is registered.
      - SkipDryRunOnMissingResource=true
---
# homelab-ai — Personal local AI/coder-agent platform
# Sources from the separate agent-k8s repo (different from homelab-k8s).
# Helm chart at charts/homelab-ai pins workloads to pve1/pve2 via proxmox-host node labels.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-ai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/isaacwallace123/agent-k8s.git
    targetRevision: main
    path: charts/homelab-ai
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: homelab-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
