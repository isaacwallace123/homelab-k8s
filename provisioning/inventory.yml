k3s_cluster:
  children:
    server:
      hosts:
        192.168.0.10: # k3s-control-plane (pve2 — 2 vCPU, 6GB RAM)

    agent:
      hosts:
        192.168.0.11: # k3s-worker-node-1 (pve1 — 4 vCPU, 16GB RAM, B580 + B50 Pro GPUs)
        192.168.0.12: # k3s-worker-node-2
        # 192.168.0.13: # k3s-worker-node-3

  vars:
    ansible_port: 22
    ansible_user: isaac

    k3s_version: v1.31.12+k3s1

    # Cluster join token — generate with: openssl rand -base64 64
    # Set via environment variable to avoid committing to git:
    #   export K3S_TOKEN="your-token-here"
    # token: ""

    api_endpoint: "{{ hostvars[groups['server'][0]]['ansible_host'] | default(groups['server'][0]) }}"

    # Disable built-in k3s components — managed via ArgoCD Helm instead:
    #   traefik    → helm chart (traefik/)
    #   servicelb  → MetalLB (metallb/)
    #   local-path → Longhorn (longhorn/)
    extra_server_args: "--disable=traefik --disable=servicelb --disable=local-storage"

    # extra_agent_args: ""
