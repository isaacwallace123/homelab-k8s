apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguard-work
  namespace: networking
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguard-config
  namespace: networking
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
  namespace: networking
  labels:
    app: adguard-home
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: adguard-home
  template:
    metadata:
      labels:
        app: adguard-home
    spec:
      containers:
        - name: adguard
          image: adguard/adguardhome:latest
          ports:
            - containerPort: 3000
              name: setup
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 853
              name: dns-tls
          volumeMounts:
            - name: work
              mountPath: /opt/adguardhome/work
            - name: config
              mountPath: /opt/adguardhome/conf
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: work
          persistentVolumeClaim:
            claimName: adguard-work
        - name: config
          persistentVolumeClaim:
            claimName: adguard-config
---
apiVersion: v1
kind: Service
metadata:
  name: adguard-home
  namespace: networking
spec:
  selector:
    app: adguard-home
  ports:
    - port: 3000
      targetPort: 3000
      name: setup
    - port: 80
      targetPort: 80
      name: http
---
# DNS service — use LoadBalancer or NodePort so your network can reach it
apiVersion: v1
kind: Service
metadata:
  name: adguard-dns
  namespace: networking
spec:
  type: LoadBalancer
  selector:
    app: adguard-home
  ports:
    - port: 53
      targetPort: 53
      name: dns-tcp
      protocol: TCP
    - port: 53
      targetPort: 53
      name: dns-udp
      protocol: UDP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: adguard
  namespace: networking
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`adguard.${DOMAIN}`)
      kind: Rule
      services:
        - name: adguard-home
          port: 3000
