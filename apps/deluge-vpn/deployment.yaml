# NOTE: Before deploying, create the VPN secret manually:
# kubectl create secret generic deluge-vpn-creds -n media \
#   --from-literal=VPN_USER=your_vpn_user \
#   --from-literal=VPN_PASS=your_vpn_pass
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deluge-vpn
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: deluge-vpn
  template:
    metadata:
      labels:
        app: deluge-vpn
    spec:
      containers:
        - name: deluge
          image: binhex/arch-delugevpn:latest
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
            privileged: true
          env:
            - name: VPN_ENABLED
              value: "yes"
            - name: VPN_PROV
              value: pia
            - name: VPN_CLIENT
              value: wireguard
            - name: STRICT_PORT_FORWARD
              value: "yes"
            - name: ENABLE_PRIVOXY
              value: "no"
            - name: LAN_NETWORK
              value: "192.168.0.0/24"
            - name: NAME_SERVERS
              value: "1.1.1.1,8.8.8.8"
            - name: DELUGE_DAEMON_LOG_LEVEL
              value: info
            - name: DELUGE_WEB_LOG_LEVEL
              value: info
            - name: DELUGE_ENABLE_WEBUI_PASSWORD
              value: "yes"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
          envFrom:
            - secretRef:
                name: deluge-vpn-creds
          ports:
            - containerPort: 8112
              name: webui
            - containerPort: 58846
              name: daemon
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: config
          hostPath:
            path: /mnt/k3s-data/deluge
            type: DirectoryOrCreate
        - name: downloads
          hostPath:
            path: /mnt/media/downloads
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: deluge-vpn
  namespace: media
spec:
  selector:
    app: deluge-vpn
  ports:
    - port: 8112
      targetPort: 8112
      name: webui
    - port: 58846
      targetPort: 58846
      name: daemon
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: deluge
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`deluge.isaacwallace.dev`)
      kind: Rule
      services:
        - name: deluge-vpn
          port: 8112
