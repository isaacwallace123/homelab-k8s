apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kimai-data
  namespace: collab
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kimai-mysql
  namespace: collab
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: kimai-secrets
  namespace: collab
type: Opaque
stringData:
  KIMAI_DB_PASSWORD: "${KIMAI_DB_PASSWORD}"
  KIMAI_ADMIN_PASSWORD: "${KIMAI_ADMIN_PASSWORD}"
---
# MySQL for Kimai
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kimai-mysql
  namespace: collab
  labels:
    app: kimai-mysql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kimai-mysql
  template:
    metadata:
      labels:
        app: kimai-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_DATABASE
              value: kimai
            - name: MYSQL_USER
              value: kimai
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kimai-secrets
                  key: KIMAI_DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kimai-secrets
                  key: KIMAI_DB_PASSWORD
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kimai-mysql
---
apiVersion: v1
kind: Service
metadata:
  name: kimai-mysql
  namespace: collab
spec:
  selector:
    app: kimai-mysql
  ports:
    - port: 3306
      targetPort: 3306
---
# Kimai app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kimai
  namespace: collab
  labels:
    app: kimai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kimai
  template:
    metadata:
      labels:
        app: kimai
    spec:
      containers:
        - name: kimai
          image: kimai/kimai2:latest
          env:
            - name: DATABASE_URL
              value: "mysql://kimai:$(KIMAI_DB_PASSWORD)@kimai-mysql:3306/kimai?charset=utf8mb4&serverVersion=8.0"
            - name: TRUSTED_PROXIES
              value: "0.0.0.0/0"
            - name: TRUSTED_HOSTS
              value: "localhost,kimai.${DOMAIN}"
            - name: ADMINMAIL
              value: "${KIMAI_ADMIN_EMAIL}"
            - name: ADMINPASS
              valueFrom:
                secretKeyRef:
                  name: kimai-secrets
                  key: KIMAI_ADMIN_PASSWORD
          envFrom:
            - secretRef:
                name: kimai-secrets
          ports:
            - containerPort: 8001
          volumeMounts:
            - name: data
              mountPath: /opt/kimai/var
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kimai-data
---
apiVersion: v1
kind: Service
metadata:
  name: kimai
  namespace: collab
spec:
  selector:
    app: kimai
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kimai
  namespace: collab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`kimai.${DOMAIN}`)
      kind: Rule
      services:
        - name: kimai
          port: 8001
      middlewares:
        - name: authentik-auth
          namespace: kube-system
