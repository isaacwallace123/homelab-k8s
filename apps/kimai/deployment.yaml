# NOTE: Before deploying, create the secret:
# kubectl create secret generic kimai-secrets -n collab \
#   --from-literal=db-password=$(openssl rand -base64 24) \
#   --from-literal=admin-password=YourAdminPassword
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kimai-mysql
  namespace: collab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kimai-mysql
  template:
    metadata:
      labels:
        app: kimai-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_DATABASE
              value: kimai
            - name: MYSQL_USER
              value: kimai
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kimai-secrets
                  key: db-password
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kimai-secrets
                  key: db-password
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          hostPath:
            path: /mnt/k3s-data/kimai/mysql
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: kimai-mysql
  namespace: collab
spec:
  selector:
    app: kimai-mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kimai
  namespace: collab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kimai
  template:
    metadata:
      labels:
        app: kimai
    spec:
      containers:
        - name: kimai
          image: kimai/kimai2:latest
          env:
            - name: DATABASE_URL
              value: "mysql://kimai:$(MYSQL_PASSWORD)@kimai-mysql:3306/kimai?charset=utf8mb4&serverVersion=8.0"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kimai-secrets
                  key: db-password
            - name: TRUSTED_PROXIES
              value: "0.0.0.0/0"
            - name: TRUSTED_HOSTS
              value: "localhost,kimai.isaacwallace.dev"
            - name: ADMINMAIL
              value: "isaac@isaacwallace.dev"
            - name: ADMINPASS
              valueFrom:
                secretKeyRef:
                  name: kimai-secrets
                  key: admin-password
          ports:
            - containerPort: 8001
          volumeMounts:
            - name: data
              mountPath: /opt/kimai/var
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          hostPath:
            path: /mnt/k3s-data/kimai/data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: kimai
  namespace: collab
spec:
  selector:
    app: kimai
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kimai
  namespace: collab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`kimai.isaacwallace.dev`)
      kind: Rule
      services:
        - name: kimai
          port: 8001
