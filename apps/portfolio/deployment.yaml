# Portfolio deployment — pulls from your GitHub repo
# Option A: Simple container with nginx serving built assets
# Option B: Use Flux/ArgoCD for GitOps (recommended, see README)
#
# This uses a simple init container to clone your repo at startup.
# For proper CI/CD, switch to GitHub Actions building a container image
# and update the image ref here (see portfolio-ci.yaml for the GH Action).

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portfolio-data
  namespace: portfolio
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-clone-script
  namespace: portfolio
data:
  clone.sh: |
    #!/bin/sh
    set -e
    if [ -d "/data/.git" ]; then
      cd /data && git pull origin ${BRANCH}
    else
      git clone --depth 1 -b ${BRANCH} ${REPO_URL} /data
    fi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: portfolio
  labels:
    app: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          env:
            - name: REPO_URL
              value: "${PORTFOLIO_GITHUB_REPO}"
            - name: BRANCH
              value: "${PORTFOLIO_BRANCH}"
          command: ["/bin/sh", "/scripts/clone.sh"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: clone-script
              mountPath: /scripts
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: portfolio-data
        - name: clone-script
          configMap:
            name: portfolio-clone-script
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio
  namespace: portfolio
spec:
  selector:
    app: portfolio
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portfolio
  namespace: portfolio
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)
      kind: Rule
      services:
        - name: portfolio
          port: 80
