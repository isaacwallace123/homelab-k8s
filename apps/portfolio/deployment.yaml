apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-clone-script
  namespace: portfolio
data:
  clone.sh: |
    #!/bin/sh
    set -e
    if [ -d "/data/.git" ]; then
      cd /data && git pull origin main
    else
      git clone --depth 1 -b main https://github.com/isaacwallace123/portfolio.git /data
    fi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          command: ["/bin/sh", "/scripts/clone.sh"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: clone-script
              mountPath: /scripts
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: data
          hostPath:
            path: /mnt/k3s-data/portfolio
            type: DirectoryOrCreate
        - name: clone-script
          configMap:
            name: portfolio-clone-script
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio
  namespace: portfolio
spec:
  selector:
    app: portfolio
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portfolio
  namespace: portfolio
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`portfolio.isaacwallace.dev`)
      kind: Rule
      services:
        - name: portfolio
          port: 80
