# .github/workflows/deploy.yml
# Place this in your portfolio repo to auto-deploy on push.
# This builds a Docker image and pushes to GHCR, then restarts the k8s deployment.
# Alternatively, it can just trigger a rollout restart to re-pull via init container.

name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Option A: Simple rollout restart (uses the init container git-pull approach)
      - name: Trigger Kubernetes rollout
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout restart deployment/portfolio -n portfolio

