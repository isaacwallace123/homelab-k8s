apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanboard
  namespace: collab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kanboard
  template:
    metadata:
      labels:
        app: kanboard
    spec:
      containers:
        - name: kanboard
          image: kanboard/kanboard:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /var/www/app/data
            - name: plugins
              mountPath: /var/www/app/plugins
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          hostPath:
            path: /mnt/k3s-data/kanboard
            type: DirectoryOrCreate
        - name: plugins
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kanboard
  namespace: collab
spec:
  selector:
    app: kanboard
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kanboard
  namespace: collab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`kanboard.isaacwallace.dev`)
      kind: Rule
      services:
        - name: kanboard
          port: 80
