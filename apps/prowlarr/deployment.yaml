apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      containers:
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
            - name: HTTP_PROXY
              value: "http://gluetun-proxy.media.svc.cluster.local:8888"
            - name: HTTPS_PROXY
              value: "http://gluetun-proxy.media.svc.cluster.local:8888"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.svc.cluster.local,.cluster.local"
          ports:
            - containerPort: 9696
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          hostPath:
            path: /mnt/k3s-data/prowlarr
            type: DirectoryOrCreate
---
# Web UI — accessible at http://192.168.0.241:9696
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.241"
    metallb.io/allow-shared-ip: "media-stack"
spec:
  type: LoadBalancer
  selector:
    app: prowlarr
  ports:
    - port: 9696
      targetPort: 9696
