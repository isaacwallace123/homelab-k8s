# If using k3s, local-path is available by default.
# This file defines a hostPath-based StorageClass for explicit control.
# For production, consider Longhorn (comes with k3s optionally).

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: homelab-local
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
