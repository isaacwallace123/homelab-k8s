# HTTPS — TLS passthrough so gRPC streams work correctly (browser will show self-signed cert warning)
# Add DNS override in AdGuard: argocd.lan → 192.168.0.245
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: argocd
  namespace: networking
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`argocd.lan`)
      services:
        - name: argocd-server
          namespace: argocd
          port: 443
  tls:
    passthrough: true
---
# HTTP → HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-http
  namespace: networking
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`argocd.lan`)
      kind: Rule
      middlewares:
        - name: redirect-https
      services:
        - name: argocd-server
          namespace: argocd
          port: 80
