# Nightly k3s state backup.
# k3s uses SQLite (not embedded etcd) as its datastore on this cluster.
# sqlite3 .backup produces a consistent point-in-time copy while k3s is live.
# Backups land in /mnt/k3s-data/etcd-backups on the control-plane node.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-snapshot
  namespace: kube-system
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists
          restartPolicy: OnFailure
          containers:
            - name: etcd-snapshot
              image: alpine:3.20
              securityContext:
                privileged: true
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache --quiet sqlite
                  BACKUP_DIR=/backup
                  DB_PATH=/k3s-db/state.db
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  DEST="${BACKUP_DIR}/state-${TIMESTAMP}.db"
                  echo "Backing up k3s SQLite state to ${DEST}..."
                  sqlite3 "${DB_PATH}" ".backup '${DEST}'"
                  echo "Backup complete ($(du -sh ${DEST} | cut -f1)). Pruning backups older than 7 days..."
                  find "${BACKUP_DIR}" -name "state-*.db" -mtime +7 -delete
                  echo "Done. Current backups:"
                  ls -lh "${BACKUP_DIR}"
              volumeMounts:
                - name: backup
                  mountPath: /backup
                - name: k3s-db
                  mountPath: /k3s-db
          volumes:
            - name: backup
              hostPath:
                path: /mnt/k3s-data/etcd-backups
                type: DirectoryOrCreate
            - name: k3s-db
              hostPath:
                path: /var/lib/rancher/k3s/server/db
                type: Directory
