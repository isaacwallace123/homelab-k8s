# Nightly k3s etcd snapshot.
# Snapshots land in /mnt/k3s-data/etcd-backups on the control-plane node.
# For off-node durability, mount the NAS via NFS and point the hostPath there.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-snapshot
  namespace: kube-system
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists
          hostPID: true
          hostNetwork: true
          restartPolicy: OnFailure
          containers:
            - name: etcd-snapshot
              image: alpine:3.20
              securityContext:
                privileged: true
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  SNAPSHOT_DIR=/backup
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  echo "Taking k3s etcd snapshot..."
                  # Run k3s in the host mount+network namespace so 127.0.0.1:6443 resolves correctly
                  nsenter -m/proc/1/ns/mnt -n/proc/1/ns/net -- /usr/local/bin/k3s etcd-snapshot save \
                    --name "snapshot-${TIMESTAMP}" \
                    --dir /mnt/k3s-data/etcd-backups
                  echo "Snapshot saved. Pruning snapshots older than 7 days..."
                  find "${SNAPSHOT_DIR}" -name "snapshot-*.zip" -mtime +7 -delete
                  echo "Done. Current snapshots:"
                  ls -lh "${SNAPSHOT_DIR}"
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              hostPath:
                path: /mnt/k3s-data/etcd-backups
                type: DirectoryOrCreate
