# ── provider-kubernetes ───────────────────────────────────────────────────────
# Lets Crossplane manage in-cluster Kubernetes objects (namespaces, quotas, limit
# ranges, network policies) as composed resources. It provisions into THIS cluster,
# so it authenticates with an injected in-cluster identity — no kubeconfig secret.
#
# Package versions are Crossplane Package refs (OCI images pulled by Crossplane, not
# Helm). Verify against the crossplane-contrib releases before a fresh bootstrap.
#
# Sync ordering matters here: the ProviderConfig's CRD ships *inside* the provider
# package, so it does not exist until the provider installs. Intra-app sync-waves make
# ArgoCD apply the Provider/Function/RBAC first (wave 1); the ProviderConfig (wave 2)
# then reconciles on a later pass once its CRD is registered. Without this the whole
# sync aborts atomically on the missing ProviderConfig kind and nothing installs.

# Fix the provider's runtime ServiceAccount name so the ClusterRoleBinding below can
# grant it exactly the permissions it needs (the default SA name is generated).
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-kubernetes
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-kubernetes
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-kubernetes
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-kubernetes:v1.2.1
  runtimeConfigRef:
    name: provider-kubernetes
---
# Composition function used by the HomeOps Composition pipeline (patch & transform).
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-patch-and-transform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  package: xpkg.upbound.io/crossplane-contrib/function-patch-and-transform:v0.10.7
---
# Scoped permissions for the provider's ServiceAccount. It manages the isolation primitives
# plus the scenario workload objects (Deployments/Services) the Composition renders —
# deliberately NOT secrets, RBAC, configmaps, pods/exec, or anything in a personal namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homeops:provider-kubernetes
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["namespaces", "resourcequotas", "limitranges", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homeops:provider-kubernetes
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homeops:provider-kubernetes
subjects:
  - kind: ServiceAccount
    name: provider-kubernetes
    namespace: crossplane-system
---
# In-cluster ProviderConfig referenced by every composed Object. InjectedIdentity uses
# the provider Pod's mounted ServiceAccount token (the SA bound above). Wave 2 + the
# skip-dry-run option let it reconcile after the provider package registers its CRD.
apiVersion: kubernetes.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: homeops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  credentials:
    source: InjectedIdentity
