# Identity for the HomeOps run-broker (the service behind homelab.isaacwallace.dev/api/v1).
#
# The broker's only cluster privilege is to CRUD LabRun composites and read their status. LabRun is
# cluster-scoped (Crossplane v2, scope: Cluster), so this is a ClusterRole. The broker cannot touch
# the disposable namespaces directly, personal namespaces, secrets, or any other resource — all
# provisioning and teardown is mediated by Crossplane through the LabRun. The broker itself is not
# deployed yet; this identity is ready for it (Delivery slice 5).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homeops-broker
  namespace: homeops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homeops-broker
rules:
  # patch/update are required for operator decisions (the broker patches spec fields like apiReplicas).
  - apiGroups: ["platform.homelab.isaacwallace.dev"]
    resources: ["labruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["platform.homelab.isaacwallace.dev"]
    resources: ["labruns/status"]
    verbs: ["get"]
  # Read-only resource usage (CPU/memory) for run telemetry. metrics.k8s.io exposes only usage
  # numbers — no pod specs, env, or secrets — so this stays low-sensitivity.
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Read Kubernetes Events in run namespaces for the arena's real event stream.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homeops-broker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homeops-broker
subjects:
  # In-homeops identity (reserved for a future in-namespace broker).
  - kind: ServiceAccount
    name: homeops-broker
    namespace: homeops
  # The api.isaacwallace.dev pod (portfolio namespace) IS the broker today — its ServiceAccount runs
  # the run-broker in-cluster, scoped to LabRun CRUD + metrics read only.
  - kind: ServiceAccount
    name: homeops-broker
    namespace: portfolio
