# checkout-traffic-spike — the first scenario Composition.
#
# Turns a LabRun into a disposable namespace with the isolation primitives in place BEFORE any
# workload (ResourceQuota, LimitRange, default-deny NetworkPolicy), then a real, self-contained
# workload inside that boundary: a "checkout" HTTP service (replica count driven by spec.apiReplicas,
# so the future "scale" decision is a one-field patch) and a load generator that drives steady
# traffic at it. Two scoped NetworkPolicy allow-rules open exactly what the workload needs —
# intra-namespace pod traffic and DNS — while all other egress stays denied.
#
# One scenario today == one Composition. A second scenario adds its own Composition (named for its
# scenario id) and the broker selects it by id; for now the XRD's defaultCompositionRef points here.
#
# Every child is a provider-kubernetes Object reconciled through the `homeops` ProviderConfig; child
# Objects are named `<runId>-<part>` to stay unique (Object is cluster-scoped). Teardown deletes the
# LabRun → Crossplane deletes these Objects → the namespace and everything in it is removed.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: checkout-traffic-spike
  labels:
    platform.homelab.isaacwallace.dev/scenario: checkout-traffic-spike
spec:
  compositeTypeRef:
    apiVersion: platform.homelab.isaacwallace.dev/v1alpha1
    kind: LabRun
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # ── disposable namespace ──────────────────────────────────────────
          - name: namespace
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: homeops
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Namespace
                    metadata:
                      name: "" # patched from spec.runId
                      labels:
                        homeops.isaacwallace.dev/managed: "true"
                        homeops.isaacwallace.dev/kind: run
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-ns" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.scenarioId
                toFieldPath: spec.forProvider.manifest.metadata.labels[homeops.isaacwallace.dev/scenario]
              - type: ToCompositeFieldPath
                fromFieldPath: spec.forProvider.manifest.metadata.name
                toFieldPath: status.namespace

          # ── resource envelope: 4 vCPU / 6 GiB, capped pod count ───────────
          - name: resourcequota
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: homeops
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ResourceQuota
                    metadata:
                      name: run-quota
                      namespace: "" # patched from spec.runId
                    spec:
                      hard:
                        requests.cpu: "4"
                        requests.memory: 6Gi
                        limits.cpu: "4"
                        limits.memory: 6Gi
                        pods: "20"
                        count/services: "10"
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-quota" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: spec.forProvider.manifest.metadata.namespace

          # ── per-container defaults + ceilings ─────────────────────────────
          - name: limitrange
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: homeops
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: LimitRange
                    metadata:
                      name: run-limits
                      namespace: "" # patched from spec.runId
                    spec:
                      limits:
                        - type: Container
                          default:
                            cpu: 500m
                            memory: 512Mi
                          defaultRequest:
                            cpu: 100m
                            memory: 128Mi
                          max:
                            cpu: "2"
                            memory: 2Gi
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-limits" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: spec.forProvider.manifest.metadata.namespace

          # ── default-deny ingress AND egress (baseline) ────────────────────
          - name: networkpolicy-default-deny
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: homeops
                forProvider:
                  manifest:
                    apiVersion: networking.k8s.io/v1
                    kind: NetworkPolicy
                    metadata:
                      name: default-deny
                      namespace: "" # patched from spec.runId
                    spec:
                      podSelector: {}
                      policyTypes:
                        - Ingress
                        - Egress
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-default-deny" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: spec.forProvider.manifest.metadata.namespace

          # ── allow intra-namespace pod traffic (load generator → checkout) ──
          - name: networkpolicy-allow-intra
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: homeops
                forProvider:
                  manifest:
                    apiVersion: networking.k8s.io/v1
                    kind: NetworkPolicy
                    metadata:
                      name: allow-intra
                      namespace: "" # patched from spec.runId
                    spec:
                      podSelector: {}
                      policyTypes:
                        - Ingress
                        - Egress
                      ingress:
                        - from:
                            - podSelector: {}
                      egress:
                        - to:
                            - podSelector: {}
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-allow-intra" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: spec.forProvider.manifest.metadata.namespace

          # ── allow DNS egress to kube-dns (so `http://checkout` resolves) ───
          - name: networkpolicy-allow-dns
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: homeops
                forProvider:
                  manifest:
                    apiVersion: networking.k8s.io/v1
                    kind: NetworkPolicy
                    metadata:
                      name: allow-dns
                      namespace: "" # patched from spec.runId
                    spec:
                      podSelector: {}
                      policyTypes:
                        - Egress
                      egress:
                        - to:
                            - namespaceSelector:
                                matchLabels:
                                  kubernetes.io/metadata.name: kube-system
                          ports:
                            - protocol: UDP
                              port: 53
                            - protocol: TCP
                              port: 53
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-allow-dns" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: spec.forProvider.manifest.metadata.namespace

          # ── checkout API: replica count driven by spec.apiReplicas ─────────
          - name: checkout-deployment
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: homeops
                forProvider:
                  manifest:
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      name: checkout
                      namespace: "" # patched from spec.runId
                      labels:
                        app: checkout
                    spec:
                      replicas: 3 # patched from spec.apiReplicas
                      selector:
                        matchLabels:
                          app: checkout
                      template:
                        metadata:
                          labels:
                            app: checkout
                        spec:
                          containers:
                            - name: whoami
                              image: traefik/whoami:v1.10.3
                              ports:
                                - containerPort: 80
                              resources:
                                requests:
                                  cpu: 50m
                                  memory: 32Mi
                                limits:
                                  cpu: 100m
                                  memory: 64Mi
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-checkout" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: spec.apiReplicas
                toFieldPath: spec.forProvider.manifest.spec.replicas

          # ── checkout Service (stable name the load generator targets) ──────
          - name: checkout-service
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: homeops
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Service
                    metadata:
                      name: checkout
                      namespace: "" # patched from spec.runId
                    spec:
                      selector:
                        app: checkout
                      ports:
                        - port: 80
                          targetPort: 80
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-checkout-svc" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: spec.forProvider.manifest.metadata.namespace

          # ── load generator: steady traffic at the checkout Service ─────────
          - name: loadgen-deployment
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: homeops
                forProvider:
                  manifest:
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      name: loadgen
                      namespace: "" # patched from spec.runId
                      labels:
                        app: loadgen
                    spec:
                      replicas: 1
                      selector:
                        matchLabels:
                          app: loadgen
                      template:
                        metadata:
                          labels:
                            app: loadgen
                        spec:
                          containers:
                            - name: loadgen
                              image: busybox:1.36
                              command:
                                - /bin/sh
                                - -c
                                - "while true; do wget -q -O- http://checkout/ >/dev/null 2>&1; sleep 1; done"
                              resources:
                                requests:
                                  cpu: 25m
                                  memory: 16Mi
                                limits:
                                  cpu: 50m
                                  memory: 32Mi
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-loadgen" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runId
                toFieldPath: spec.forProvider.manifest.metadata.namespace
