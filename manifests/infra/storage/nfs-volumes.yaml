# ── Portfolio ─────────────────────────────────────────────────────────────────
# postgres and redis use Longhorn (provisioned dynamically in deployment.yaml).
# Only uploads stays on NFS because it needs ReadWriteMany.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tank-portfolio-uploads
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: portfolio
    name: tank-portfolio-uploads
  nfs:
    server: 192.168.0.252
    path: /mnt/tank/configs/portfolio/uploads
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tank-portfolio-uploads
  namespace: portfolio
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: tank-portfolio-uploads
  resources:
    requests:
      storage: 10Gi
---
