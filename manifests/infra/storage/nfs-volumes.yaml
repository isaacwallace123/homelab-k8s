# ── Media ─────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tank-movies
  annotations: {}
spec:
  capacity:
    storage: 4Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: media
    name: tank-movies
  nfs:
    server: 192.168.0.252
    path: /mnt/tank/movies
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tank-movies
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: tank-movies
  resources:
    requests:
      storage: 4Ti
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tank-tv
  annotations: {}
spec:
  capacity:
    storage: 4Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: media
    name: tank-tv
  nfs:
    server: 192.168.0.252
    path: /mnt/tank/tv
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tank-tv
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: tank-tv
  resources:
    requests:
      storage: 4Ti
---
# ── Fast downloads (NVMe pool, passed through to TrueNAS) ──────────────────────
# Scratch space for in-flight + seeding downloads. Lives on the NVMe pool, NOT
# tank — tank is long-term library storage only. Imports copy NVMe→tank.
# flash/downloads child dataset (root dataset can't be permissioned/shared).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nvme-downloads
  annotations: {}
spec:
  capacity:
    storage: 450Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: media
    name: nvme-downloads
  nfs:
    server: 192.168.0.252
    path: /mnt/flash/downloads
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nvme-downloads
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: nvme-downloads
  resources:
    requests:
      storage: 450Gi
