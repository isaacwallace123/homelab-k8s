# ── Portfolio ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tank-portfolio-postgres
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: portfolio
    name: tank-portfolio-postgres
  nfs:
    server: 192.168.0.254
    path: /tank/config/portfolio/postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tank-portfolio-postgres
  namespace: portfolio
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: tank-portfolio-postgres
  resources:
    requests:
      storage: 5Gi
---
