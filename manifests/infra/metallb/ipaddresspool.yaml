apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: homelab-pool
  namespace: networking
spec:
  # autoAssign off: every service pins its own IP (organized by /tens), so MetalLB
  # never hands out an address on its own — prevents accidental collisions.
  autoAssign: false
  addresses:
    # Organized ranges (see service annotations):
    #   .201-.209 core infra | .220-.229 dashboards
    #   .230-.239 media       | .240-.249 monitoring + spare
    # .210-.219 is EXCLUDED: owned by the other Proxmox k8s/agones cluster VMs.
    # IMPORTANT: GigaHub DHCP must end at .200 or lower (it currently ends at .200).
    - 192.168.0.201-192.168.0.209
    - 192.168.0.220-192.168.0.250
