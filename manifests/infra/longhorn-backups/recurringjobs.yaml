# Daily snapshot — retains 3 snapshots per volume.
# Only LOW-CHURN, hard-to-rebuild volumes opt in (databases + app configs) via:
#   recurring-job-group.longhorn.io/default: enabled
# High-churn/rebuildable volumes (Plex cache, Prometheus/Loki TSDB, redis) are
# intentionally NOT snapshotted — 7-day snapshot retention on those bloated them
# to 2-3x nominal size (Plex 54GB, Prometheus 44GB) and filled the node disks.
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-snapshot
  namespace: longhorn-system
spec:
  cron: "0 2 * * *"
  task: snapshot
  groups:
    - default
  retain: 3
  concurrency: 2
  labels: {}
