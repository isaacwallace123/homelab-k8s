# Direct LAN access to the ArgoCD UI — https://192.168.0.203 (no DNS needed).
# argocd-server keeps its own self-signed TLS cert, so expect a browser warning.
# Replaces the argocd.lan TLSRoute (see argocd-route.yaml.disabled).
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-lb
  namespace: argocd
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.203"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - port: 443
      targetPort: 8080
      name: https
