apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: images
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/isaacwallace123/homelab-k8s.git
    targetRevision: main
    path: manifests/apps/images
  destination:
    server: https://kubernetes.default.svc
    namespace: images
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
