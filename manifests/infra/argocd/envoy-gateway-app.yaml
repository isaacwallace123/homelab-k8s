apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    # Full OCI path in repoURL — no chart field — generates correct:
    # helm pull oci://ghcr.io/envoyproxy/gateway-helm --version v1.3.2
    repoURL: oci://ghcr.io/envoyproxy/gateway-helm
    targetRevision: v1.3.2
    helm:
      values: |
        config:
          envoyGateway:
            provider:
              type: Kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
