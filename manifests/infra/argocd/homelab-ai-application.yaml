# homelab-ai is managed as a standalone Application (not via ApplicationSet)
# because it is a Helm chart sourced from a Git repo (agent-k8s),
# which requires a git+helm source rather than a Helm registry source.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-ai
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/isaacwallace123/agent-k8s.git
    targetRevision: main
    path: charts/homelab-ai
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: homelab-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
