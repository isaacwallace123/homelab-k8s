# TLS certificate for ArgoCD server, issued by the homelab CA.
# ArgoCD automatically picks up the secret named argocd-server-tls.
# Add DNS override in AdGuard: argocd.lan → 192.168.0.245
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-tls
  namespace: argocd
spec:
  secretName: argocd-server-tls
  issuerRef:
    name: homelab-ca
    kind: ClusterIssuer
  dnsNames:
    - argocd.lan
    - argocd-server
    - argocd-server.argocd.svc.cluster.local
