# ── Velero MinIO ──────────────────────────────────────────────────────────────
# S3-compatible backend for Velero backups. Internal-only.
# Endpoint (for Velero BSL): http://velero-minio.velero.svc.cluster.local:9000
# Admin console (LAN):       https://velero-minio.lan
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velero-minio
  namespace: velero
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: velero-minio
  template:
    metadata:
      labels:
        app: velero-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-11-07T00-52-20Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: velero-credentials
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: velero-credentials
                  key: minio-root-password
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tank-velero-minio
---
apiVersion: v1
kind: Service
metadata:
  name: velero-minio
  namespace: velero
spec:
  selector:
    app: velero-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: velero-minio-console
  namespace: velero
spec:
  selector:
    app: velero-minio
  ports:
    - name: console
      port: 9001
      targetPort: 9001
---
# Console — exposed via LAN HTTPS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: velero-minio-console
  namespace: velero
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
      namespace: networking
      sectionName: https-lan
  hostnames:
    - velero-minio.lan
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: velero-minio-console
          port: 9001
          weight: 1
