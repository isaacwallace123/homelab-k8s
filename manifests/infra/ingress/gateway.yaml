apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-gateway
  namespace: networking
spec:
  gatewayClassName: envoy
  infrastructure:
    annotations:
      metallb.io/loadBalancerIPs: "192.168.0.245"
  listeners:
    # Plain HTTP — used for public apps (portfolio via Cloudflare Tunnel)
    # and HTTP→HTTPS redirects on .lan domains
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS termination for *.lan domains — uses cert-manager-issued CA cert
    # Add DNS override in AdGuard: <hostname>.lan → 192.168.0.245
    - name: https-lan
      protocol: HTTPS
      port: 443
      hostname: "*.lan"
      tls:
        mode: Terminate
        certificateRefs:
          - name: lan-tls
            namespace: networking
      allowedRoutes:
        namespaces:
          from: All

    # TLS passthrough for ArgoCD — preserves gRPC streams, passes SNI directly to argocd-server
    # argocd.lan is more specific than *.lan so this listener wins for that hostname
    - name: argocd-passthrough
      protocol: TLS
      port: 443
      hostname: argocd.lan
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: All
