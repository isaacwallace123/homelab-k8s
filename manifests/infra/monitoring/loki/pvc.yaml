apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    # No recurring snapshots: Loki log storage is high-churn observability data.
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
