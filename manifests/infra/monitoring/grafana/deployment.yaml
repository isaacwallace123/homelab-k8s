apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: community
        orgId: 1
        folder: Community
        type: file
        disableDeletion: false
        updateIntervalSeconds: 60
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards
      - name: custom
        orgId: 1
        folder: Homelab
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/custom-dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      securityContext:
        fsGroup: 472
        runAsUser: 472
      initContainers:
        - name: fix-grafana-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /var/lib/grafana /var/lib/grafana/dashboards /var/lib/grafana/custom-dashboards && chown -R 472:472 /var/lib/grafana
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
        - name: download-dashboards
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              set -e
              BASE="https://grafana.com/api/dashboards"
              echo "Downloading community dashboards..."
              curl -fsSL "$BASE/1860/revisions/latest/download"  -o /dashboards/node-exporter-full.json
              curl -fsSL "$BASE/3662/revisions/latest/download"  -o /dashboards/prometheus-stats.json
              curl -fsSL "$BASE/14055/revisions/latest/download" -o /dashboards/loki-operational.json
              curl -fsSL "$BASE/15141/revisions/latest/download" -o /dashboards/loki-log-search.json
              curl -fsSL "$BASE/17346/revisions/latest/download" -o /dashboards/traefik.json
              echo "Fixing datasource variable references..."
              sed -i 's/\${DS_PROMETHEUS}/Prometheus/g' /dashboards/*.json
              sed -i 's/\${DS_LOKI}/Loki/g' /dashboards/*.json
              echo "Done."
          volumeMounts:
            - name: dashboards
              mountPath: /dashboards
      containers:
        - name: grafana
          image: grafana/grafana:latest
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: admin-password
            - name: GF_SERVER_ROOT_URL
              value: "http://grafana.monitoring.svc.cluster.local:3000"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: custom-dashboards
              mountPath: /var/lib/grafana/custom-dashboards
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          hostPath:
            path: /mnt/k3s-data/grafana
            type: DirectoryOrCreate
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          emptyDir: {}
        - name: custom-dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.247"
spec:
  type: LoadBalancer
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
