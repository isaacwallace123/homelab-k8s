apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    # No recurring snapshots: Prometheus TSDB is high-churn; snapshots bloated
    # this volume to ~44GB. Metrics are observability data, safe to not snapshot.
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
