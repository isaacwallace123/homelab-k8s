# ── Network Policies ──────────────────────────────────────────────────────────
# Strategy: default-deny ingress per sensitive namespace; allow-all within
# each namespace; explicit cross-namespace allow rules where needed.

# ── secrets namespace: deny all pod-to-pod ingress ───────────────────────────
# Sealed-secrets controller only receives from the k8s API server (host process),
# which is not subject to NetworkPolicy. This blocks lateral movement to secrets.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-pod-ingress
  namespace: secrets
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress: []
---
# ── All namespaces: allow intra-namespace traffic ─────────────────────────────
# Also allow ingress from networking namespace (Envoy Gateway routes to these).
# media
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: media
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-ingress
  namespace: networking
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - {}  # networking is the public-facing entry point — allow all (LAN, Cloudflare, cluster)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: portfolio
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
---
# ── Allow Prometheus to scrape all namespaces ─────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: media
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
