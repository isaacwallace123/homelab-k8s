# ── Network Policies ──────────────────────────────────────────────────────────
# Strategy: default-deny ingress per sensitive namespace; allow-all within
# each namespace; explicit cross-namespace allow rules where needed.

# ── secrets namespace: deny all pod-to-pod ingress ───────────────────────────
# Sealed-secrets controller only receives from the k8s API server (host process),
# which is not subject to NetworkPolicy. This blocks lateral movement to secrets.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-pod-ingress
  namespace: secrets
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress: []
---
# ── All namespaces: allow intra-namespace traffic ─────────────────────────────
# Also allow ingress from networking namespace (Envoy Gateway routes to these).
# media
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: media
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: portfolio
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-ingress
  namespace: networking
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - {}  # networking is the public-facing entry point — allow all (LAN, Cloudflare, cluster)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: portfolio
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
---
# ── Allow Prometheus to scrape all namespaces ─────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: media
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: networking
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: portfolio
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
---
# ── cortex namespace ─────────────────────────────────────────────────────────
# AI workloads. Allow intra-namespace + gateway + portfolio (infra-agent→overwatch).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: cortex
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: portfolio
---
# ── argocd namespace ──────────────────────────────────────────────────────────
# Allow intra-namespace (controller→server→dex) + gateway for UI.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: argocd
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
---
# ── cert-manager namespace ────────────────────────────────────────────────────
# cert-manager is outbound-only (ACME challenges, k8s API). Allow intra-namespace
# so controller→webhook communication works.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
# ── longhorn-system namespace ─────────────────────────────────────────────────
# Longhorn engines/replicas communicate across nodes within the namespace.
# Also allow monitoring scrapes and gateway access for the UI.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: longhorn-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
---
# ── envoy-gateway-system namespace ───────────────────────────────────────────
# Envoy receives external traffic from MetalLB (L2) — must allow all ingress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-ingress
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - {}
---
# ── velero namespace ──────────────────────────────────────────────────────────
# Allow intra-namespace (velero→node-agent→minio) + gateway for MinIO console.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: velero
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
---
# ── Plex: allow all external ingress ─────────────────────────────────────────
# Plex clients on the LAN connect directly to 192.168.0.241:32400 (MetalLB L2).
# Without this, the allow-same-namespace deny-all would block those connections.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-plex-external
  namespace: media
spec:
  podSelector:
    matchLabels:
      app: plex
  policyTypes:
    - Ingress
  ingress:
    - {}
