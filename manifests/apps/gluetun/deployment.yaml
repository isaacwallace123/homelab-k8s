apiVersion: apps/v1
kind: Deployment
metadata:
  name: gluetun
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gluetun
  template:
    metadata:
      labels:
        app: gluetun
    spec:
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:latest
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: nordvpn
            - name: VPN_TYPE
              value: openvpn
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: gluetun-nordvpn
                  key: OPENVPN_USER
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gluetun-nordvpn
                  key: OPENVPN_PASSWORD
            - name: SERVER_COUNTRIES
              value: Canada
            - name: HTTPPROXY
              value: "on"
            - name: HTTPPROXY_LOG
              value: "off"
          ports:
            - containerPort: 8888
              name: http-proxy
            - containerPort: 8388
              name: socks5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
---
# HTTP proxy — for Prowlarr indexer searches: http://gluetun-proxy.media.svc.cluster.local:8888
# SOCKS5 proxy — for qBittorrent torrent traffic: socks5://gluetun-proxy.media.svc.cluster.local:8388
apiVersion: v1
kind: Service
metadata:
  name: gluetun-proxy
  namespace: media
spec:
  type: ClusterIP
  selector:
    app: gluetun
  ports:
    - port: 8888
      targetPort: 8888
      name: http-proxy
    - port: 8388
      targetPort: 8388
      name: socks5
