apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
  namespace: networking
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: adguard-home
  template:
    metadata:
      labels:
        app: adguard-home
    spec:
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      containers:
        - name: adguard
          image: adguard/adguardhome:v0.107.74
          args:
            - --web-addr
            - 0.0.0.0:80
            - --config
            - /opt/adguardhome/conf/AdGuardHome.yaml
            - --work-dir
            - /opt/adguardhome/work
            - --no-check-update
          ports:
            - containerPort: 3000
              name: setup
            - containerPort: 80
              name: http
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 53
              name: dns-udp
              protocol: UDP
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: work
              mountPath: /opt/adguardhome/work
            - name: config
              mountPath: /opt/adguardhome/conf
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
        - name: bootstrap
          image: python:3.14.4-slim
          command: [python3, /scripts/bootstrap.py]
          env:
            - name: ADGUARD_USER
              valueFrom:
                secretKeyRef:
                  name: adguard-auth
                  key: ADGUARD_USER
            - name: ADGUARD_PASS
              valueFrom:
                secretKeyRef:
                  name: adguard-auth
                  key: ADGUARD_PASS
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: work
          persistentVolumeClaim:
            claimName: tank-config-adguard-work
        - name: config
          persistentVolumeClaim:
            claimName: tank-config-adguard-conf
        - name: scripts
          configMap:
            name: adguard-bootstrap
            defaultMode: 0755
---
# Web UI — accessible at http://192.168.0.240:3000
apiVersion: v1
kind: Service
metadata:
  name: adguard-home
  namespace: networking
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.240"
spec:
  type: LoadBalancer
  selector:
    app: adguard-home
  ports:
    - port: 3000
      targetPort: 3000
      name: setup
    - port: 80
      targetPort: 80
      name: http
---
# DNS — accessible at 192.168.0.246:53
apiVersion: v1
kind: Service
metadata:
  name: adguard-dns
  namespace: networking
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.246"
spec:
  type: LoadBalancer
  selector:
    app: adguard-home
  ports:
    - port: 53
      targetPort: 53
      name: dns-tcp
      protocol: TCP
    - port: 53
      targetPort: 53
      name: dns-udp
      protocol: UDP
