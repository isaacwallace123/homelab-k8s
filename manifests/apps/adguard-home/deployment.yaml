apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
  namespace: networking
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: adguard-home
  template:
    metadata:
      labels:
        app: adguard-home
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      containers:
        - name: adguard
          image: adguard/adguardhome:latest
          ports:
            - containerPort: 3000
              name: setup
            - containerPort: 80
              name: http
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 53
              name: dns-udp
              protocol: UDP
          volumeMounts:
            - name: work
              mountPath: /opt/adguardhome/work
            - name: config
              mountPath: /opt/adguardhome/conf
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: work
          hostPath:
            path: /mnt/k3s-data/adguard/work
            type: DirectoryOrCreate
        - name: config
          hostPath:
            path: /mnt/k3s-data/adguard/conf
            type: DirectoryOrCreate
---
# Web UI — accessible at http://192.168.0.240:3000
apiVersion: v1
kind: Service
metadata:
  name: adguard-home
  namespace: networking
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.240"
spec:
  type: LoadBalancer
  selector:
    app: adguard-home
  ports:
    - port: 3000
      targetPort: 3000
      name: setup
    - port: 80
      targetPort: 80
      name: http
---
# DNS — accessible at 192.168.0.246:53
apiVersion: v1
kind: Service
metadata:
  name: adguard-dns
  namespace: networking
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.246"
spec:
  type: LoadBalancer
  selector:
    app: adguard-home
  ports:
    - port: 53
      targetPort: 53
      name: dns-tcp
      protocol: TCP
    - port: 53
      targetPort: 53
      name: dns-udp
      protocol: UDP
