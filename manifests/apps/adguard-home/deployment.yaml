apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
  namespace: networking
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: adguard-home
  template:
    metadata:
      labels:
        app: adguard-home
    spec:
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      initContainers:
        # AdGuard stores the pod IP as bind_host. On reschedule the old IP is
        # gone and the process panics. Reset it to 0.0.0.0 every start.
        - name: fix-bind-host
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              cfg=/conf/AdGuardHome.yaml
              if [ -f "$cfg" ]; then
                sed -i 's/bind_host: .*/bind_host: 0.0.0.0/' "$cfg"
                echo "bind_host reset to 0.0.0.0"
              else
                echo "No config yet — first boot, skipping"
              fi
          volumeMounts:
            - name: config
              mountPath: /conf

      containers:
        - name: adguard
          image: adguard/adguardhome:latest
          ports:
            - containerPort: 3000
              name: setup
            - containerPort: 80
              name: http
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 53
              name: dns-udp
              protocol: UDP
          volumeMounts:
            - name: work
              mountPath: /opt/adguardhome/work
            - name: config
              mountPath: /opt/adguardhome/conf
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: work
          persistentVolumeClaim:
            claimName: tank-config-adguard-work
        - name: config
          persistentVolumeClaim:
            claimName: tank-config-adguard-conf
---
# Web UI — accessible at http://192.168.0.240:3000
apiVersion: v1
kind: Service
metadata:
  name: adguard-home
  namespace: networking
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.240"
spec:
  type: LoadBalancer
  selector:
    app: adguard-home
  ports:
    - port: 3000
      targetPort: 3000
      name: setup
    - port: 80
      targetPort: 80
      name: http
---
# DNS — accessible at 192.168.0.246:53
apiVersion: v1
kind: Service
metadata:
  name: adguard-dns
  namespace: networking
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.246"
spec:
  type: LoadBalancer
  selector:
    app: adguard-home
  ports:
    - port: 53
      targetPort: 53
      name: dns-tcp
      protocol: TCP
    - port: 53
      targetPort: 53
      name: dns-udp
      protocol: UDP
