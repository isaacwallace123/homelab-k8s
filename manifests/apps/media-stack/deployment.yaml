apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-stack
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: media-stack
  template:
    metadata:
      labels:
        app: media-stack
    spec:
      nodeSelector:
        node-role.kubernetes.io/apps: "true"

      # Runs before all app containers. Sets qBittorrent WebUI password (once,
      # idempotent) and strips the old proxy settings that are no longer needed
      # now that all containers share gluetun's network namespace.
      initContainers:
        - name: qbittorrent-init
          image: python:3.14.4-slim
          command: [python3, "-c"]
          args:
            - |
              import hashlib, base64, os

              config_dir = '/data/qBittorrent'
              config_file = os.path.join(config_dir, 'qBittorrent.conf')
              password = os.environ.get('WEBUI_PASSWORD', '')

              os.makedirs(config_dir, exist_ok=True)

              lines = []
              if os.path.exists(config_file):
                  with open(config_file) as f:
                      lines = f.readlines()

              # Strip proxy keys — no longer needed with VPN sidecar pattern
              remove_prefixes = (
                  'Connection\\ProxyType=',
                  'Connection\\ProxyIp=',
                  'Connection\\ProxyPort=',
                  'Connection\\ProxyPeerConnections=',
                  'Proxy\\Type=',
                  'Proxy\\Ip=',
                  'Proxy\\Port=',
                  'Proxy\\PeerConnections=',
                  'Proxy\\HostnameLookupEnabled=',
                  'Proxy\\Profiles\\',
              )
              filtered = [l for l in lines if not any(l.lstrip().startswith(p) for p in remove_prefixes)]

              if password:
                  # Always overwrite — sealed secret is the source of truth.
                  # Strip any existing username/password lines first.
                  filtered = [l for l in filtered
                              if 'Password_PBKDF2' not in l and not l.lstrip().startswith('WebUI\\Username=')]
                  salt = os.urandom(16)
                  key = hashlib.pbkdf2_hmac('sha512', password.encode(), salt, 100000, dklen=64)
                  pw_hash = '@ByteArray({}:{})'.format(
                      base64.b64encode(salt).decode(),
                      base64.b64encode(key).decode()
                  )
                  prefs_idx = next((i for i, l in enumerate(filtered) if l.strip() == '[Preferences]'), None)
                  if prefs_idx is None:
                      filtered.append('\n[Preferences]\n')
                      prefs_idx = len(filtered) - 1
                  filtered.insert(prefs_idx + 1, 'WebUI\\Username=admin\n')
                  filtered.insert(prefs_idx + 2, 'WebUI\\Password_PBKDF2="{}"\n'.format(pw_hash))
                  print('Password set from secret')
              else:
                  print('WARNING: WEBUI_PASSWORD secret not found, leaving config unchanged')

              with open(config_file, 'w') as f:
                  f.writelines(filtered)
              print('qBittorrent init complete')
          env:
            - name: WEBUI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-auth
                  key: WEBUI_PASSWORD
                  optional: true
          volumeMounts:
            - name: config-qbittorrent
              mountPath: /data


      containers:

        # ── gluetun ──────────────────────────────────────────────────────────
        # All other containers share this pod's network namespace.
        # Their outbound traffic is automatically routed through the VPN tunnel.
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: nordvpn
            - name: VPN_TYPE
              value: wireguard
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-nordvpn
                  key: WIREGUARD_PRIVATE_KEY
            - name: SERVER_COUNTRIES
              value: Canada
            - name: UPDATER_PERIOD
              value: 24h
            - name: HTTP_CONTROL_SERVER_ADDRESS
              value: ":8000"
            - name: FIREWALL_INPUT_PORTS
              value: "8000,8080,8090,7878,8989,9696,8191,5055"
          ports:
            - containerPort: 8000
              name: health
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi

        # ── qbittorrent ───────────────────────────────────────────────────────
        # Downloads to /downloads (fast HDD via NFS).
        # Radarr/Sonarr import finished downloads to /movies and /tv (8TB NFS).
        # No proxy config needed — traffic goes through gluetun automatically.
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.1.4-r3-ls453
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: qbit-ui
            - containerPort: 6881
              name: torrent-tcp
            - containerPort: 6881
              protocol: UDP
              name: torrent-udp
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config-qbittorrent
              mountPath: /config
            - name: downloads
              mountPath: /downloads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi

        # ── radarr ────────────────────────────────────────────────────────────
        - name: radarr
          image: lscr.io/linuxserver/radarr:6.1.1.10360-ls301
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 7878
              name: radarr-ui
          readinessProbe:
            httpGet:
              path: /
              port: 7878
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 7878
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config-radarr
              mountPath: /config
            - name: movies
              mountPath: /movies
            - name: downloads
              mountPath: /downloads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi

        # ── sonarr ────────────────────────────────────────────────────────────
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls310
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 8989
              name: sonarr-ui
          readinessProbe:
            httpGet:
              path: /
              port: 8989
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8989
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config-sonarr
              mountPath: /config
            - name: tv
              mountPath: /tv
            - name: downloads
              mountPath: /downloads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi

        # ── prowlarr ──────────────────────────────────────────────────────────
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:2.3.5.5327-ls144
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 9696
              name: prowlarr-ui
          readinessProbe:
            httpGet:
              path: /
              port: 9696
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 9696
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config-prowlarr
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi

        # ── flaresolverr ──────────────────────────────────────────────────────
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
          env:
            - name: LOG_LEVEL
              value: info
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 8191
              name: flare-ui
          readinessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi

        # ── sabnzbd ───────────────────────────────────────────────────────────
        - name: sabnzbd
          image: lscr.io/linuxserver/sabnzbd:5.0.1-ls251
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 8090
              name: sabnzbd-ui
          readinessProbe:
            httpGet:
              path: /
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config-sabnzbd
              mountPath: /config
            - name: downloads
              mountPath: /downloads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 2Gi

        # ── seerr ─────────────────────────────────────────────────────────────
        - name: overseerr
          image: ghcr.io/seerr-team/seerr:v3.2.0
          env:
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 5055
              name: overseerr-ui
          readinessProbe:
            httpGet:
              path: /api/v1/status
              port: 5055
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/status
              port: 5055
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config-overseerr
              mountPath: /app/config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi

        # ── bootstrap ─────────────────────────────────────────────────────────
        # Reads each app's API key from its config.xml, waits for all apps to
        # start, then wires up qBittorrent download clients, FlareSolverr proxy,
        # and Prowlarr→Radarr/Sonarr app sync. Idempotent — safe to restart.
        - name: bootstrap
          image: python:3.14.4-slim
          command: [python3, /scripts/bootstrap.py]
          env:
            - name: QB_USER
              value: admin
            - name: QB_PASS
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-auth
                  key: WEBUI_PASSWORD
                  optional: true
            - name: PLEX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: plex-auth
                  key: PLEX_TOKEN
                  optional: true
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: config-radarr
              mountPath: /config/radarr
              readOnly: true
            - name: config-sonarr
              mountPath: /config/sonarr
              readOnly: true
            - name: config-prowlarr
              mountPath: /config/prowlarr
              readOnly: true
            - name: config-sabnzbd
              mountPath: /config/sabnzbd
              readOnly: true
            - name: downloads
              mountPath: /downloads
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi

      volumes:
        - name: config-qbittorrent
          persistentVolumeClaim:
            claimName: config-qbittorrent
        - name: config-radarr
          persistentVolumeClaim:
            claimName: config-radarr
        - name: config-sonarr
          persistentVolumeClaim:
            claimName: config-sonarr
        - name: config-prowlarr
          persistentVolumeClaim:
            claimName: config-prowlarr
        - name: config-sabnzbd
          persistentVolumeClaim:
            claimName: config-sabnzbd
        - name: downloads
          persistentVolumeClaim:
            claimName: tank-downloads
        - name: movies
          persistentVolumeClaim:
            claimName: tank-movies
        - name: tv
          persistentVolumeClaim:
            claimName: tank-tv
        - name: config-overseerr
          persistentVolumeClaim:
            claimName: config-overseerr
        - name: scripts
          configMap:
            name: media-stack-bootstrap
            defaultMode: 0755
