# ── Media Stack Services ───────────────────────────────────────────────────────
# Direct LAN access via dedicated MetalLB IPs (no DNS required):
#   qBittorrent  http://192.168.0.247      Radarr    http://192.168.0.233
#   SABnzbd      http://192.168.0.248      Sonarr    http://192.168.0.243
#   Overseerr    http://192.168.0.249      Prowlarr  http://192.168.0.244
#   Plex         http://192.168.0.241:32400
# Each service also keeps its native port so in-cluster widgets keep working.
# NOTE: requires the allow-media-external NetworkPolicy (default-deny otherwise).
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.247"
spec:
  type: LoadBalancer
  selector:
    app: media-stack
  ports:
    - port: 80
      targetPort: 8080
      name: http
    - port: 8080
      targetPort: 8080
      name: webui
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: media
  annotations:
    # .242 is taken by cortex/courier — radarr uses .233
    metallb.io/loadBalancerIPs: "192.168.0.233"
spec:
  type: LoadBalancer
  selector:
    app: media-stack
  ports:
    - port: 80
      targetPort: 7878
      name: http
    - port: 7878
      targetPort: 7878
      name: webui
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.243"
spec:
  type: LoadBalancer
  selector:
    app: media-stack
  ports:
    - port: 80
      targetPort: 8989
      name: http
    - port: 8989
      targetPort: 8989
      name: webui
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.244"
spec:
  type: LoadBalancer
  selector:
    app: media-stack
  ports:
    - port: 80
      targetPort: 9696
      name: http
    - port: 9696
      targetPort: 9696
      name: webui
---
apiVersion: v1
kind: Service
metadata:
  name: sabnzbd
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.248"
spec:
  type: LoadBalancer
  selector:
    app: media-stack
  ports:
    - port: 80
      targetPort: 8090
      name: http
    - port: 8090
      targetPort: 8090
      name: webui
---
apiVersion: v1
kind: Service
metadata:
  name: overseerr
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.249"
spec:
  type: LoadBalancer
  selector:
    app: media-stack
  ports:
    - port: 80
      targetPort: 5055
      name: http
    - port: 5055
      targetPort: 5055
      name: webui
