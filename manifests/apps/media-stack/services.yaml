# ── Media Stack Services ───────────────────────────────────────────────────────
# All web UIs accessible via https://<name>.lan (routed through Envoy Gateway).
# Plex keeps its LoadBalancer at 192.168.0.241 — media clients need direct IP.
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
spec:
  type: ClusterIP
  selector:
    app: media-stack
  ports:
    - port: 8080
      targetPort: 8080
      name: webui
---
