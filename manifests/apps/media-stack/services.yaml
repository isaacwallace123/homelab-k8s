# ── Media Stack Services ───────────────────────────────────────────────────────
# Direct LAN access via dedicated MetalLB IPs (media block .230-.239, no DNS):
#   Plex       http://192.168.0.230:32400   Radarr    http://192.168.0.231
#   Sonarr     http://192.168.0.232         Prowlarr  http://192.168.0.233
#   qBittorrent http://192.168.0.234        SABnzbd   http://192.168.0.235
#   Overseerr  http://192.168.0.236
# Each service also keeps its native port so in-cluster widgets keep working.
# NOTE: requires the allow-media-external NetworkPolicy (default-deny otherwise).
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.234"
spec:
  type: LoadBalancer
  selector:
    app: media-stack
  ports:
    - port: 80
      targetPort: 8080
      name: http
    - port: 8080
      targetPort: 8080
      name: webui
---
apiVersion: v1
