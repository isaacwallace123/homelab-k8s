# One-shot job: copies existing configs from NFS PVCs into the new Longhorn PVCs.
# Run this AFTER scaling down old deployments and BEFORE applying the new
# media-stack deployment.
#
# Usage:
#   kubectl apply -f migration-job.yaml
#   kubectl wait --for=condition=complete job/migrate-configs -n media --timeout=120s
#   kubectl delete -f migration-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-configs
  namespace: media
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      # Each init container copies one app's config directory.
      # They run sequentially so only one NFS RWO PVC is accessed at a time.
      initContainers:
        - name: copy-qbittorrent
          image: busybox:1.36
          command: [sh, -c, "cp -av /src/. /dst/ && echo 'qbittorrent done'"]
          volumeMounts:
            - name: src-qbittorrent
              mountPath: /src
              readOnly: true
            - name: dst-qbittorrent
              mountPath: /dst

        - name: copy-radarr
          image: busybox:1.36
          command: [sh, -c, "cp -av /src/. /dst/ && echo 'radarr done'"]
          volumeMounts:
            - name: src-radarr
              mountPath: /src
              readOnly: true
            - name: dst-radarr
              mountPath: /dst

        - name: copy-sonarr
          image: busybox:1.36
          command: [sh, -c, "cp -av /src/. /dst/ && echo 'sonarr done'"]
          volumeMounts:
            - name: src-sonarr
              mountPath: /src
              readOnly: true
            - name: dst-sonarr
              mountPath: /dst

        - name: copy-prowlarr
          image: busybox:1.36
          command: [sh, -c, "cp -av /src/. /dst/ && echo 'prowlarr done'"]
          volumeMounts:
            - name: src-prowlarr
              mountPath: /src
              readOnly: true
            - name: dst-prowlarr
              mountPath: /dst

        - name: copy-plex
          image: busybox:1.36
          command: [sh, -c, "cp -av /src/. /dst/ && echo 'plex done'"]
          volumeMounts:
            - name: src-plex
              mountPath: /src
              readOnly: true
            - name: dst-plex
              mountPath: /dst

      containers:
        - name: done
          image: busybox:1.36
          command: [sh, -c, "echo 'All configs migrated successfully'"]

      volumes:
        - name: src-qbittorrent
          persistentVolumeClaim:
            claimName: tank-config-qbittorrent
        - name: dst-qbittorrent
          persistentVolumeClaim:
            claimName: config-qbittorrent
        - name: src-radarr
          persistentVolumeClaim:
            claimName: tank-config-radarr
        - name: dst-radarr
          persistentVolumeClaim:
            claimName: config-radarr
        - name: src-sonarr
          persistentVolumeClaim:
            claimName: tank-config-sonarr
        - name: dst-sonarr
          persistentVolumeClaim:
            claimName: config-sonarr
        - name: src-prowlarr
          persistentVolumeClaim:
            claimName: tank-config-prowlarr
        - name: dst-prowlarr
          persistentVolumeClaim:
            claimName: config-prowlarr
        - name: src-plex
          persistentVolumeClaim:
            claimName: tank-config-plex
        - name: dst-plex
          persistentVolumeClaim:
            claimName: config-plex
