apiVersion: v1
kind: ConfigMap
metadata:
  name: media-stack-bootstrap
  namespace: media
data:
  bootstrap.py: |
    #!/usr/bin/env python3
    """
    Wires up the media-stack apps after they start.
    Runs as a sidecar in the same pod so all URLs are localhost.
    Idempotent — skips anything already configured.
    """
    import configparser, http.cookiejar, json, os, re, time, urllib.parse, urllib.request, urllib.error, xml.etree.ElementTree as ET

    RADARR_URL   = "http://localhost:7878"
    SONARR_URL   = "http://localhost:8989"
    PROWLARR_URL = "http://localhost:9696"
    QB_URL       = "http://localhost:8080"
    SAB_URL      = "http://localhost:8090"

    def read_sabnzbd_key(path, max_wait=600):
        deadline = time.time() + max_wait
        while time.time() < deadline:
            try:
                with open(path) as f:
                    content = f.read()
                m = re.search(r'^api_key\s*=\s*(\S+)', content, re.MULTILINE)
                if m and len(m.group(1)) > 8:
                    return m.group(1)
            except Exception:
                pass
            time.sleep(5)
        raise RuntimeError(f"SABnzbd API key not found in {path} after {max_wait}s")

    def wait_ready_sabnzbd(api_key):
        print("Waiting for SABnzbd...", flush=True)
        for _ in range(120):
            try:
                url = f"{SAB_URL}/api?mode=version&output=json&apikey={api_key}"
                req = urllib.request.Request(url)
                with urllib.request.urlopen(req, timeout=5) as r:
                    json.loads(r.read())
                    print("SABnzbd ready", flush=True)
                    return
            except Exception:
                pass
            time.sleep(5)
        raise RuntimeError("SABnzbd not ready after 10 minutes")

    def add_sabnzbd_client(base_url, api_key, app, sab_key):
        clients = get(f"{base_url}/api/v3/downloadclient", api_key)
        existing = next((c for c in clients if c.get("name") == "SABnzbd"), None)
        is_radarr = "7878" in base_url
        cat_field  = "movieCategory"  if is_radarr else "tvCategory"
        prio_field  = "recentMoviePriority" if is_radarr else "recentTvPriority"
        prio_field2 = "olderMoviePriority"  if is_radarr else "olderTvPriority"
        payload = {
            "name": "SABnzbd",
            "enable": True,
            "protocol": "usenet",
            "priority": 1,
            "removeCompletedDownloads": True,
            "removeFailedDownloads": True,
            "fields": [
                {"name": "host",       "value": "localhost"},
                {"name": "port",       "value": 8090},
                {"name": "useSsl",     "value": False},
                {"name": "urlBase",    "value": ""},
                {"name": "apiKey",     "value": sab_key},
                {"name": cat_field,    "value": "radarr" if is_radarr else "sonarr"},
                {"name": prio_field,   "value": 0},
                {"name": prio_field2,  "value": 0},
            ],
            "implementationName": "SABnzbd",
            "implementation":     "Sabnzbd",
            "configContract":     "SabnzbdSettings",
            "tags": [],
        }
        if existing:
            delete(f"{base_url}/api/v3/downloadclient/{existing['id']}", api_key)
        post(f"{base_url}/api/v3/downloadclient", api_key, payload)
        action = "updated" if existing else "added"
        print(f"{app}: SABnzbd download client {action}", flush=True)

    def read_api_key(path, max_wait=600):
        deadline = time.time() + max_wait
        while time.time() < deadline:
            try:
                key = ET.parse(path).getroot().findtext("ApiKey")
                if key:
                    return key
            except Exception:
                pass
            time.sleep(5)
        raise RuntimeError(f"API key not found in {path} after {max_wait}s")

    def get(url, api_key):
        req = urllib.request.Request(url, headers={"X-Api-Key": api_key})
        with urllib.request.urlopen(req, timeout=10) as r:
            return json.loads(r.read())

    def post(url, api_key, payload):
        data = json.dumps(payload).encode()
        req = urllib.request.Request(url, data=data, method="POST",
            headers={"X-Api-Key": api_key, "Content-Type": "application/json"})
        try:
            with urllib.request.urlopen(req, timeout=10) as r:
                content = r.read()
                return json.loads(content) if content else {}
        except urllib.error.HTTPError as e:
            body = e.read().decode(errors="replace")
            print(f"POST {url} → HTTP {e.code}: {body[:500]}", flush=True)
            raise

    def wait_ready(base_url, api_key, name, ver="v3"):
        print(f"Waiting for {name}...", flush=True)
        for _ in range(120):
            try:
                get(f"{base_url}/api/{ver}/system/status", api_key)
                print(f"{name} ready", flush=True)
                return
            except Exception:
                pass
            time.sleep(5)
        raise RuntimeError(f"{name} not ready after 10 minutes")

    def configure_qbittorrent(qb_user, qb_pass):
        jar = http.cookiejar.CookieJar()
        opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(jar))

        # Wait for qBittorrent WebUI to be ready (root returns 200 without auth)
        print("Waiting for qBittorrent...", flush=True)
        for _ in range(120):
            try:
                urllib.request.urlopen(f"{QB_URL}/", timeout=5)
                break
            except Exception:
                time.sleep(5)
        else:
            raise RuntimeError("qBittorrent not ready")
        print("qBittorrent ready", flush=True)

        # Login
        data = urllib.parse.urlencode({"username": qb_user, "password": qb_pass}).encode()
        resp = opener.open(f"{QB_URL}/api/v2/auth/login", data)
        result = resp.read().decode().strip()
        if result != "Ok.":
            print(f"qBittorrent login failed: {result} — skipping QB config", flush=True)
            return

        # Sync WebUI credentials from the secret — localhost auth bypass means
        # bootstrap always gets "Ok." on login, so we must explicitly push the
        # correct password so external browser logins work.
        creds = json.dumps({
            "web_ui_username": qb_user,
            "web_ui_password": qb_pass,
        })
        opener.open(f"{QB_URL}/api/v2/app/setPreferences",
                    urllib.parse.urlencode({"json": creds}).encode())
        print("qBittorrent: WebUI credentials synced", flush=True)

        # Set default save path and disable temp path
        prefs = json.dumps({"save_path": "/downloads", "temp_path_enabled": False})
        opener.open(f"{QB_URL}/api/v2/app/setPreferences",
                    urllib.parse.urlencode({"json": prefs}).encode())
        print("qBittorrent: save path set to /downloads", flush=True)

        # Pre-create category subdirs so Radarr/Sonarr health checks pass
        for subdir in ["/downloads/radarr", "/downloads/sonarr"]:
            os.makedirs(subdir, exist_ok=True)
            print(f"Created {subdir}", flush=True)

        # Create per-app categories so downloads land in tidy subdirectories
        for cat, path in [("radarr", "/downloads/radarr"), ("sonarr", "/downloads/sonarr")]:
            form = urllib.parse.urlencode({"category": cat, "savePath": path}).encode()
            try:
                opener.open(f"{QB_URL}/api/v2/torrents/createCategory", form)
                print(f"qBittorrent: category '{cat}' → {path}", flush=True)
            except urllib.error.HTTPError as e:
                if e.code != 409:
                    raise
                try:
                    opener.open(f"{QB_URL}/api/v2/torrents/editCategory", form)
                    print(f"qBittorrent: category '{cat}' updated → {path}", flush=True)
                except urllib.error.HTTPError:
                    print(f"qBittorrent: category '{cat}' already set", flush=True)

    def delete(url, api_key):
        req = urllib.request.Request(url, method="DELETE",
            headers={"X-Api-Key": api_key})
        with urllib.request.urlopen(req, timeout=10) as r:
            pass

    def add_qbittorrent_client(base_url, api_key, app, qb_user, qb_pass):
        clients = get(f"{base_url}/api/v3/downloadclient", api_key)
        existing = next((c for c in clients if c.get("name") == "qBittorrent"), None)
        is_radarr = "7878" in base_url
        cat_field = "movieCategory" if is_radarr else "tvCategory"
        prio_field = "recentMoviePriority" if is_radarr else "recentTvPriority"
        prio_field2 = "olderMoviePriority" if is_radarr else "olderTvPriority"
        payload = {
            "name": "qBittorrent",
            "enable": True,
            "protocol": "torrent",
            "priority": 1,
            "removeCompletedDownloads": True,
            "removeFailedDownloads": True,
            "fields": [
                {"name": "host",          "value": "localhost"},
                {"name": "port",          "value": 8080},
                {"name": "useSsl",        "value": False},
                {"name": "urlBase",       "value": ""},
                {"name": "username",      "value": qb_user},
                {"name": "password",      "value": qb_pass},
                {"name": cat_field,       "value": "radarr" if is_radarr else "sonarr"},
                {"name": prio_field,      "value": 0},
                {"name": prio_field2,     "value": 0},
                {"name": "initialState",  "value": 0},
                {"name": "sequentialOrder", "value": False},
                {"name": "firstAndLast",  "value": False},
            ],
            "implementationName": "qBittorrent",
            "implementation":     "QBittorrent",
            "configContract":     "QBittorrentSettings",
            "tags": [],
        }
        if existing:
            delete(f"{base_url}/api/v3/downloadclient/{existing['id']}", api_key)
        post(f"{base_url}/api/v3/downloadclient", api_key, payload)
        action = "updated" if existing else "added"
        print(f"{app}: qBittorrent download client {action}", flush=True)

    def add_root_folder(base_url, api_key, app, path):
        folders = get(f"{base_url}/api/v3/rootfolder", api_key)
        if any(f.get("path") == path for f in folders):
            print(f"{app}: root folder {path} already configured", flush=True)
            return
        try:
            post(f"{base_url}/api/v3/rootfolder", api_key, {"path": path})
            print(f"{app}: root folder {path} added", flush=True)
        except urllib.error.HTTPError as e:
            print(f"WARNING: {app}: root folder {path} failed (HTTP {e.code}) — check permissions", flush=True)

    def add_flaresolverr(prowlarr_key):
        proxies = get(f"{PROWLARR_URL}/api/v1/indexerproxy", prowlarr_key)
        if any(p.get("name") == "FlareSolverr" for p in proxies):
            print("Prowlarr: FlareSolverr already configured", flush=True)
            return
        try:
            post(f"{PROWLARR_URL}/api/v1/indexerproxy", prowlarr_key, {
                "name": "FlareSolverr",
                "implementation":  "FlareSolverr",
                "configContract":  "FlareSolverrSettings",
                "fields": [
                    {"name": "host",           "value": "http://localhost:8191"},
                    {"name": "requestTimeout", "value": 60},
                ],
                "tags": [],
            })
            print("Prowlarr: FlareSolverr proxy added", flush=True)
        except urllib.error.HTTPError as e:
            if e.code == 409:
                print("Prowlarr: FlareSolverr already exists (skipping)", flush=True)
            else:
                raise

    def add_prowlarr_app(prowlarr_key, app_name, app_url, app_key):
        apps = get(f"{PROWLARR_URL}/api/v1/applications", prowlarr_key)
        if any(a.get("name") == app_name for a in apps):
            print(f"Prowlarr: {app_name} already configured", flush=True)
            return
        is_radarr = app_name == "Radarr"
        cats = ([2000,2010,2020,2030,2040,2045,2050,2060]
                if is_radarr else
                [5000,5010,5020,5030,5040,5045,5050,5060,5070])
        try:
            post(f"{PROWLARR_URL}/api/v1/applications", prowlarr_key, {
                "name":           app_name,
                "implementation": app_name,
                "configContract": f"{app_name}Settings",
                "fields": [
                    {"name": "prowlarrUrl",    "value": "http://localhost:9696"},
                    {"name": "baseUrl",        "value": app_url},
                    {"name": "apiKey",         "value": app_key},
                    {"name": "syncCategories", "value": cats},
                ],
                "tags": [],
            })
            print(f"Prowlarr: {app_name} app added", flush=True)
        except urllib.error.HTTPError as e:
            if e.code == 409:
                print(f"Prowlarr: {app_name} already exists (skipping)", flush=True)
            else:
                raise

    print("Bootstrap starting...", flush=True)

    print("Reading Radarr API key...", flush=True)
    radarr_key   = read_api_key("/config/radarr/config.xml")
    print("Reading Sonarr API key...", flush=True)
    sonarr_key   = read_api_key("/config/sonarr/config.xml")
    print("Reading Prowlarr API key...", flush=True)
    prowlarr_key = read_api_key("/config/prowlarr/config.xml")
    print("Reading SABnzbd API key...", flush=True)
    sabnzbd_key  = read_sabnzbd_key("/config/sabnzbd/sabnzbd.ini")
    qb_user = os.environ.get("QB_USER", "admin")
    qb_pass = os.environ.get("QB_PASS", "")

    wait_ready(RADARR_URL,   radarr_key,   "Radarr",   "v3")
    wait_ready(SONARR_URL,   sonarr_key,   "Sonarr",   "v3")
    wait_ready(PROWLARR_URL, prowlarr_key, "Prowlarr", "v1")
    wait_ready_sabnzbd(sabnzbd_key)

    configure_qbittorrent(qb_user, qb_pass)
    add_root_folder(RADARR_URL, radarr_key, "Radarr", "/movies")
    add_root_folder(SONARR_URL, sonarr_key, "Sonarr", "/tv")
    add_qbittorrent_client(RADARR_URL,   radarr_key,   "Radarr",   qb_user, qb_pass)
    add_qbittorrent_client(SONARR_URL,   sonarr_key,   "Sonarr",   qb_user, qb_pass)
    add_sabnzbd_client(RADARR_URL,   radarr_key,   "Radarr",   sabnzbd_key)
    add_sabnzbd_client(SONARR_URL,   sonarr_key,   "Sonarr",   sabnzbd_key)
    add_flaresolverr(prowlarr_key)
    add_prowlarr_app(prowlarr_key, "Radarr", RADARR_URL, radarr_key)
    add_prowlarr_app(prowlarr_key, "Sonarr", SONARR_URL, sonarr_key)

    print("Bootstrap complete!", flush=True)
    while True:
        time.sleep(86400)
