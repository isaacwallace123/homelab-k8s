apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: networking
data:
  server.yml: |
    base-url: https://ntfy.lan
    listen-http: :8080
    cache-file: /var/cache/ntfy/cache.db
    cache-duration: 12h
    attachment-cache-dir: /var/cache/ntfy/attachments
    attachment-total-size-limit: 2G
    attachment-file-size-limit: 15M
    attachment-expiry-duration: 3h
    keepalive-interval: 45s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: networking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      nodeSelector:
        node-role.kubernetes.io/infra: "true"
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.11.0
          args: [serve]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/ntfy
            - name: cache
              mountPath: /var/cache/ntfy
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: ntfy-config
        - name: cache
          emptyDir: {}
---
# Notification server — accessible at https://ntfy.lan (routed via Envoy Gateway)
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: networking
spec:
  type: ClusterIP
  selector:
    app: ntfy
  ports:
    - port: 80
      targetPort: 8080
