apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 7878
          volumeMounts:
            - name: config
              mountPath: /config
            - name: movies
              mountPath: /movies
            - name: downloads
              mountPath: /downloads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: tank-config-radarr
        - name: movies
          persistentVolumeClaim:
            claimName: tank-movies
        - name: downloads
          persistentVolumeClaim:
            claimName: tank-downloads
---
# Web UI — accessible at http://192.168.0.241:7878
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.241"
    metallb.io/allow-shared-ip: "media-stack"
spec:
  type: LoadBalancer
  selector:
    app: radarr
  ports:
    - port: 7878
      targetPort: 7878
