apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: networking
data:
  settings.yaml: |
    title: Homelab
    theme: dark
    color: zinc
    cardBlur: md
    headerStyle: clean
    hideVersion: true
    useEqualHeights: true

  services.yaml: |
    - Media:
        - Plex:
            href: http://192.168.0.241:32400/web
            icon: plex.png
            description: Media Server
        - Overseerr:
            href: http://192.168.0.241:5055
            icon: overseerr.png
            description: Media Requests
            widget:
              type: overseerr
              url: http://192.168.0.241:5055
              key: "{{HOMEPAGE_VAR_OVERSEERR_KEY}}"
        - Radarr:
            href: http://192.168.0.241:7878
            icon: radarr.png
            description: Movies
            widget:
              type: radarr
              url: http://192.168.0.241:7878
              key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
        - Sonarr:
            href: http://192.168.0.241:8989
            icon: sonarr.png
            description: TV Shows
            widget:
              type: sonarr
              url: http://192.168.0.241:8989
              key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
        - Prowlarr:
            href: http://192.168.0.241:9696
            icon: prowlarr.png
            description: Indexers
            widget:
              type: prowlarr
              url: http://192.168.0.241:9696
              key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
        - qBittorrent:
            href: http://192.168.0.241:8080
            icon: qbittorrent.png
            description: Torrent Client (VPN)
            widget:
              type: qbittorrent
              url: http://192.168.0.241:8080
              username: admin
              password: "{{HOMEPAGE_VAR_QB_PASS}}"
        - SABnzbd:
            href: http://192.168.0.241:8090
            icon: sabnzbd.png
            description: Usenet Client
            widget:
              type: sabnzbd
              url: http://192.168.0.241:8090
              key: "{{HOMEPAGE_VAR_SAB_KEY}}"

    - Networking:
        - AdGuard Home:
            href: http://192.168.0.240
            icon: adguard-home.png
            description: DNS & Ad Blocker
        - Cudy Router:
            href: http://192.168.0.1
            icon: router.png
            description: Home Router
        - Envoy Gateway:
            href: http://192.168.0.245
            icon: envoy.png
            description: Reverse Proxy

    - Monitoring:
        - Grafana:
            href: http://192.168.0.247:3000
            icon: grafana.png
            description: Metrics & Dashboards
            widget:
              type: grafana
              url: http://192.168.0.247:3000
              username: admin
              password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"
        - CPU:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prometheus.png
            description: Cluster Average
            widget:
              type: prometheusmetric
              url: http://prometheus.monitoring.svc.cluster.local:9090
              query: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
              refreshInterval: 15000
              format:
                type: number
                scale: 1
                suffix: "%"
                maximumFractionDigits: 1
        - Memory:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prometheus.png
            description: Cluster Average
            widget:
              type: prometheusmetric
              url: http://prometheus.monitoring.svc.cluster.local:9090
              query: (1 - (sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))) * 100
              refreshInterval: 15000
              format:
                type: number
                scale: 1
                suffix: "%"
                maximumFractionDigits: 1
        - Network In:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prometheus.png
            description: Cluster Total
            widget:
              type: prometheusmetric
              url: http://prometheus.monitoring.svc.cluster.local:9090
              query: sum(rate(node_network_receive_bytes_total{device!~"lo|cni.*|veth.*|tunl.*|flannel.*"}[5m]))
              refreshInterval: 15000
              format:
                type: number
                scale: 0.000001
                suffix: " MB/s"
                maximumFractionDigits: 2

    - Infrastructure:
        - ArgoCD:
            href: https://argocd.lan
            icon: argocd.png
            description: GitOps Deployments
        - Proxmox:
            href: https://192.168.0.254:8006
            icon: proxmox.png
            description: Hypervisor
        - TrueNAS:
            href: http://192.168.0.252
            icon: truenas.png
            description: NAS Storage
        - Portfolio:
            href: https://isaacwallace.dev
            icon: nextjs.png
            description: Personal Website

  widgets.yaml: |
    - search:
        provider: google
        target: _blank
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hour12: true

  bookmarks.yaml: |
    []

  docker.yaml: |
    {}

  kubernetes.yaml: |
    mode: disable

  custom.css: |
    /* ── Kleff: dark · sandy-gold · glass · depth ──────────────────────── */
    /* Class names verified from live DOM inspection                        */

    :root {
      --gold:         #c9a84c;
      --gold-bright:  #e2c06a;
      --gold-glow:    rgba(201,168,76,0.22);
      --gold-border:  rgba(201,168,76,0.20);
      --gold-subtle:  rgba(201,168,76,0.08);
      --glass:        rgba(12,10,6,0.65);
      --text-hi:      rgba(245,232,205,0.93);
      --text-lo:      rgba(190,168,118,0.55);
    }

    /* ── Page background with depth blobs ── */
    body { background: #090805 !important; }
    #page_wrapper {
      background: #090805 !important;
      position: relative;
    }
    #page_wrapper::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle 800px at  8% 55%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(circle 600px at 92% 18%, rgba(201,168,76,0.05) 0%, transparent 55%),
        radial-gradient(circle 500px at 50% 95%, rgba(201,168,76,0.04) 0%, transparent 50%);
    }

    /* ── Animations ── */
    @keyframes kleff-in {
      from { opacity: 0; transform: translateY(16px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0)    scale(1);     }
    }
    @keyframes kleff-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Header bar ── */
    #information-widgets {
      border-color: rgba(201,168,76,0.15) !important;
      animation: kleff-fade 0.5s ease-out both;
    }

    /* ── Search input ── */
    input.overflow-hidden {
      background: rgba(14,11,6,0.80) !important;
      border-color: rgba(201,168,76,0.22) !important;
      border-radius: 10px !important;
      color: var(--text-hi) !important;
      transition: border-color 0.22s, box-shadow 0.22s !important;
    }
    input.overflow-hidden:focus {
      border-color: var(--gold) !important;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.14) !important;
    }
    input.overflow-hidden::placeholder { color: rgba(190,168,118,0.38) !important; }

    /* Search submit button */
    #information-widgets button {
      background: rgba(201,168,76,0.12) !important;
      transition: background 0.2s !important;
    }
    #information-widgets button:hover { background: rgba(201,168,76,0.22) !important; }

    /* ── Datetime ── */
    .information-widget-datetime span {
      color: var(--gold) !important;
      font-weight: 500 !important;
      text-shadow: 0 0 20px rgba(201,168,76,0.35);
    }

    /* ── Category group header ── */
    .service-group-name {
      color: var(--gold) !important;
      font-size: 0.60rem !important;
      font-weight: 700 !important;
      letter-spacing: 0.18em !important;
      text-transform: uppercase !important;
      text-shadow: 0 0 20px rgba(201,168,76,0.40) !important;
    }

    /* ── Service card (actual glass tile) ── */
    .service-card {
      background: var(--glass) !important;
      backdrop-filter: blur(26px) saturate(120%) !important;
      -webkit-backdrop-filter: blur(26px) saturate(120%) !important;
      border: 1px solid var(--gold-border) !important;
      border-radius: 13px !important;
      box-shadow:
        0 2px 18px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.04) !important;
      transition:
        background     0.28s ease,
        border-color   0.28s ease,
        box-shadow     0.28s ease,
        transform      0.28s cubic-bezier(0.22,1,0.36,1) !important;
      overflow: hidden !important;
    }

    /* Top-left gold sheen on every card */
    .service-card::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 13px;
      background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 40%);
    }

    .service-card:hover {
      background: rgba(22,18,9,0.82) !important;
      border-color: rgba(201,168,76,0.45) !important;
      transform: translateY(-4px) !important;
      box-shadow:
        0 14px 44px rgba(0,0,0,0.58),
        0 0   28px var(--gold-glow),
        inset 0 1px 0 rgba(255,255,255,0.07) !important;
    }

    /* Staggered card entrance per group */
    .service:nth-child(1)  .service-card { animation: kleff-in 0.45s cubic-bezier(0.22,1,0.36,1) 0.04s both; }
    .service:nth-child(2)  .service-card { animation: kleff-in 0.45s cubic-bezier(0.22,1,0.36,1) 0.08s both; }
    .service:nth-child(3)  .service-card { animation: kleff-in 0.45s cubic-bezier(0.22,1,0.36,1) 0.12s both; }
    .service:nth-child(4)  .service-card { animation: kleff-in 0.45s cubic-bezier(0.22,1,0.36,1) 0.16s both; }
    .service:nth-child(5)  .service-card { animation: kleff-in 0.45s cubic-bezier(0.22,1,0.36,1) 0.20s both; }
    .service:nth-child(6)  .service-card { animation: kleff-in 0.45s cubic-bezier(0.22,1,0.36,1) 0.24s both; }
    .service:nth-child(7)  .service-card { animation: kleff-in 0.45s cubic-bezier(0.22,1,0.36,1) 0.28s both; }
    .service:nth-child(8)  .service-card { animation: kleff-in 0.45s cubic-bezier(0.22,1,0.36,1) 0.32s both; }
    .service:nth-child(9)  .service-card { animation: kleff-in 0.45s cubic-bezier(0.22,1,0.36,1) 0.36s both; }
    .service:nth-child(10) .service-card { animation: kleff-in 0.45s cubic-bezier(0.22,1,0.36,1) 0.40s both; }

    /* ── Service name & description ── */
    .service-name {
      color: var(--text-hi) !important;
      font-weight: 600 !important;
    }
    .service-description {
      color: var(--text-lo) !important;
    }

    /* ── Icon — glow on hover ── */
    .service-card:hover .service-icon img,
    .service-card:hover .service-icon svg {
      filter: drop-shadow(0 0 8px rgba(201,168,76,0.55)) brightness(1.08) !important;
      transition: filter 0.28s ease !important;
    }

    /* ── Widget stat cells (dl/dt/dd rows) ── */
    .service-card dl {
      gap: 0.35rem !important;
    }
    .service-card dl > div {
      background: rgba(201,168,76,0.06) !important;
      border: 1px solid rgba(201,168,76,0.12) !important;
      border-radius: 8px !important;
      transition: background 0.22s !important;
    }
    .service-card:hover dl > div {
      background: rgba(201,168,76,0.10) !important;
    }
    /* Stat value — gold */
    .service-card dl dt {
      color: var(--gold-bright) !important;
      font-weight: 700 !important;
    }
    /* Stat label — dim */
    .service-card dl dd {
      color: var(--text-lo) !important;
      font-weight: 500 !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar       { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: rgba(12,10,6,0.5); }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.28); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.50); }

    /* ── Error state ── */
    [class*="bg-red-500"] {
      background: rgba(140,25,25,0.35) !important;
      border: 1px solid rgba(220,60,60,0.22) !important;
      backdrop-filter: blur(10px) !important;
      border-radius: 8px !important;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: networking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "192.168.0.248"
            - name: HOMEPAGE_VAR_QB_PASS
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: QB_PASS
            - name: HOMEPAGE_VAR_GRAFANA_PASS
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: GRAFANA_PASS
            - name: HOMEPAGE_VAR_OVERSEERR_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: OVERSEERR_KEY
            - name: HOMEPAGE_VAR_RADARR_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: RADARR_KEY
            - name: HOMEPAGE_VAR_SONARR_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: SONARR_KEY
            - name: HOMEPAGE_VAR_PROWLARR_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: PROWLARR_KEY
            - name: HOMEPAGE_VAR_SAB_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: SAB_KEY
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
            - name: config
              mountPath: /app/config/services.yaml
              subPath: services.yaml
            - name: config
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
            - name: config
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
            - name: config
              mountPath: /app/config/docker.yaml
              subPath: docker.yaml
            - name: config
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
            - name: config
              mountPath: /app/config/custom.css
              subPath: custom.css
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: homepage-config
---
# Dashboard — replaces Homer at http://192.168.0.248
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: networking
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.248"
spec:
  type: LoadBalancer
  selector:
    app: homepage
  ports:
    - port: 80
      targetPort: 3000
