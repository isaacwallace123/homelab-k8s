apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: networking
data:
  settings.yaml: |
    title: Homelab
    theme: dark
    color: zinc
    cardBlur: md
    headerStyle: clean
    hideVersion: true
    useEqualHeights: true

  services.yaml: |
    - Media:
        - Plex:
            href: https://plex.lan/web
            icon: plex.png
            description: Media Server
            widget:
              type: plex
              url: http://plex.media.svc.cluster.local:32400
              key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"
        - Overseerr:
            href: https://overseerr.lan
            icon: overseerr.png
            description: Media Requests
            widget:
              type: overseerr
              url: http://overseerr.media.svc.cluster.local:5055
              key: "{{HOMEPAGE_VAR_OVERSEERR_KEY}}"
        - Radarr:
            href: https://radarr.lan
            icon: radarr.png
            description: Movies
            widget:
              type: radarr
              url: http://radarr.media.svc.cluster.local:7878
              key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
        - Sonarr:
            href: https://sonarr.lan
            icon: sonarr.png
            description: TV Shows
            widget:
              type: sonarr
              url: http://sonarr.media.svc.cluster.local:8989
              key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
        - Prowlarr:
            href: https://prowlarr.lan
            icon: prowlarr.png
            description: Indexers
            widget:
              type: prowlarr
              url: http://prowlarr.media.svc.cluster.local:9696
              key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
        - qBittorrent:
            href: https://qbittorrent.lan
            icon: qbittorrent.png
            description: Torrent Client (VPN)
            widget:
              type: qbittorrent
              url: http://qbittorrent.media.svc.cluster.local:8080
              username: admin
              password: "{{HOMEPAGE_VAR_QB_PASS}}"
        - SABnzbd:
            href: https://sabnzbd.lan
            icon: sabnzbd.png
            description: Usenet Client
            widget:
              type: sabnzbd
              url: http://sabnzbd.media.svc.cluster.local:8090
              key: "{{HOMEPAGE_VAR_SAB_KEY}}"

    - Networking:
        - AdGuard Home:
            href: https://adguard.lan
            icon: adguard-home.png
            description: DNS & Ad Blocker
            widget:
              type: adguard
              url: http://adguard-home.networking.svc.cluster.local:80
              username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
              password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
        - Cudy Router:
            href: http://192.168.0.1
            icon: router.png
            description: Home Router
        - Envoy Gateway:
            href: http://192.168.0.245
            icon: envoy.png
            description: Reverse Proxy

    - Monitoring:
        - Grafana:
            href: https://grafana.lan
            icon: grafana.png
            description: Metrics & Dashboards
            widget:
              type: grafana
              url: http://grafana.monitoring.svc.cluster.local:3000
              username: admin
              password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"
        - Cluster:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prometheus.png
            description: CPU · RAM · Network
            widget:
              type: prometheusmetric
              url: http://prometheus.monitoring.svc.cluster.local:9090
              refreshInterval: 10000
              metrics:
                - label: CPU
                  query: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
                  format:
                    type: number
                    scale: 1
                    suffix: "%"
                    options:
                      maximumFractionDigits: 1
                - label: Memory
                  query: (1 - (sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))) * 100
                  format:
                    type: number
                    scale: 1
                    suffix: "%"
                    options:
                      maximumFractionDigits: 1
                - label: Net In
                  query: sum(rate(node_network_receive_bytes_total{device!~"lo|cni.*|veth.*|tunl.*|flannel.*"}[5m]))
                  format:
                    type: number
                    scale: 0.000001
                    suffix: " MB/s"
                    options:
                      maximumFractionDigits: 1
                - label: Net Out
                  query: sum(rate(node_network_transmit_bytes_total{device!~"lo|cni.*|veth.*|tunl.*|flannel.*"}[5m]))
                  format:
                    type: number
                    scale: 0.000001
                    suffix: " MB/s"
                    options:
                      maximumFractionDigits: 1
        - Disk I/O:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prometheus.png
            description: Storage Throughput
            widget:
              type: prometheusmetric
              url: http://prometheus.monitoring.svc.cluster.local:9090
              refreshInterval: 10000
              metrics:
                - label: Read
                  query: sum(rate(node_disk_read_bytes_total[5m]))
                  format:
                    type: number
                    scale: 0.000001
                    suffix: " MB/s"
                    options:
                      maximumFractionDigits: 1
                - label: Write
                  query: sum(rate(node_disk_written_bytes_total[5m]))
                  format:
                    type: number
                    scale: 0.000001
                    suffix: " MB/s"
                    options:
                      maximumFractionDigits: 1
                - label: IOPS R
                  query: sum(rate(node_disk_reads_completed_total[5m]))
                  format:
                    type: number
                    scale: 1
                    suffix: "/s"
                    options:
                      maximumFractionDigits: 0
                - label: IOPS W
                  query: sum(rate(node_disk_writes_completed_total[5m]))
                  format:
                    type: number
                    scale: 1
                    suffix: "/s"
                    options:
                      maximumFractionDigits: 0

    - Infrastructure:
        - ArgoCD:
            href: https://argocd.lan
            icon: argocd.png
            description: GitOps Deployments
        - Proxmox:
            href: https://192.168.0.254:8006
            icon: proxmox.png
            description: Hypervisor
        - TrueNAS:
            href: http://192.168.0.252
            icon: truenas.png
            description: NAS Storage
        - Portfolio:
            href: https://isaacwallace.dev
            icon: nextjs.png
            description: Personal Website

  widgets.yaml: |
    - search:
        provider: google
        target: _blank
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hour12: true

  bookmarks.yaml: |
    []

  docker.yaml: |
    {}

  kubernetes.yaml: |
    mode: disable

  custom.css: |
    /* ── Kleff: dark · sandy-gold · glass · Apple-widget depth ─────────── */

    :root {
      --gold:         #c9a84c;
      --gold-bright:  #e8ca72;
      --gold-dim:     #a8883a;
      --gold-glow:    rgba(201,168,76,0.25);
      --gold-border:  rgba(201,168,76,0.18);
      --glass:        rgba(14,11,6,0.72);
      --glass-hover:  rgba(24,19,9,0.85);
      --text-hi:      rgba(250,238,210,0.95);
      --text-lo:      rgba(185,160,105,0.52);
      --radius:       20px;
    }

    /* ── Page background ── */
    body { background: #080703 !important; }
    #page_wrapper {
      background: #080703 !important;
      position: relative;
    }
    #page_wrapper::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 900px 600px at  5% 60%, rgba(201,168,76,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 700px 500px at 95% 15%, rgba(201,168,76,0.06) 0%, transparent 55%),
        radial-gradient(ellipse 600px 400px at 55% 98%, rgba(201,168,76,0.04) 0%, transparent 50%);
    }

    /* ── Animations ── */
    @keyframes kleff-in {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes kleff-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Header bar ── */
    #information-widgets {
      border-color: rgba(201,168,76,0.12) !important;
      animation: kleff-fade 0.5s ease-out both;
    }

    /* ── Search input ── */
    input.overflow-hidden {
      background: rgba(16,12,6,0.85) !important;
      border-color: rgba(201,168,76,0.20) !important;
      border-radius: 12px !important;
      color: var(--text-hi) !important;
      transition: border-color 0.2s, box-shadow 0.2s !important;
    }
    input.overflow-hidden:focus {
      border-color: var(--gold) !important;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12) !important;
    }
    input.overflow-hidden::placeholder { color: rgba(185,160,105,0.32) !important; }

    #information-widgets button {
      background: rgba(201,168,76,0.10) !important;
      transition: background 0.2s !important;
    }
    #information-widgets button:hover { background: rgba(201,168,76,0.20) !important; }

    /* ── Datetime ── */
    .information-widget-datetime span {
      color: var(--gold) !important;
      font-weight: 500 !important;
      text-shadow: 0 0 24px rgba(201,168,76,0.30);
    }

    /* ── Category group header ── */
    .service-group-name {
      color: var(--gold-dim) !important;
      font-size: 0.58rem !important;
      font-weight: 800 !important;
      letter-spacing: 0.20em !important;
      text-transform: uppercase !important;
    }

    /* ── Service card — Apple widget shape ── */
    .service-card {
      background: var(--glass) !important;
      backdrop-filter: blur(32px) saturate(130%) !important;
      -webkit-backdrop-filter: blur(32px) saturate(130%) !important;
      border: 1px solid var(--gold-border) !important;
      border-radius: var(--radius) !important;
      box-shadow:
        0 4px 24px rgba(0,0,0,0.60),
        0 1px  0  rgba(255,255,255,0.04) inset,
        0 -1px 0  rgba(0,0,0,0.30) inset !important;
      transition:
        background   0.25s ease,
        border-color 0.25s ease,
        box-shadow   0.25s ease,
        transform    0.25s cubic-bezier(0.34,1.56,0.64,1) !important;
      overflow: hidden !important;
      position: relative !important;
    }

    /* Diagonal sheen stripe */
    .service-card::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: var(--radius);
      background: linear-gradient(
        135deg,
        rgba(201,168,76,0.07) 0%,
        transparent 45%,
        rgba(201,168,76,0.02) 100%
      );
    }

    .service-card:hover {
      background: var(--glass-hover) !important;
      border-color: rgba(201,168,76,0.40) !important;
      transform: translateY(-3px) scale(1.005) !important;
      box-shadow:
        0 16px 48px rgba(0,0,0,0.65),
        0  0   32px var(--gold-glow),
        0  1px  0  rgba(255,255,255,0.06) inset !important;
    }

    /* Staggered entrance */
    .service:nth-child(1)  .service-card { animation: kleff-in 0.50s cubic-bezier(0.34,1.56,0.64,1) 0.03s both; }
    .service:nth-child(2)  .service-card { animation: kleff-in 0.50s cubic-bezier(0.34,1.56,0.64,1) 0.07s both; }
    .service:nth-child(3)  .service-card { animation: kleff-in 0.50s cubic-bezier(0.34,1.56,0.64,1) 0.11s both; }
    .service:nth-child(4)  .service-card { animation: kleff-in 0.50s cubic-bezier(0.34,1.56,0.64,1) 0.15s both; }
    .service:nth-child(5)  .service-card { animation: kleff-in 0.50s cubic-bezier(0.34,1.56,0.64,1) 0.19s both; }
    .service:nth-child(6)  .service-card { animation: kleff-in 0.50s cubic-bezier(0.34,1.56,0.64,1) 0.23s both; }
    .service:nth-child(7)  .service-card { animation: kleff-in 0.50s cubic-bezier(0.34,1.56,0.64,1) 0.27s both; }
    .service:nth-child(8)  .service-card { animation: kleff-in 0.50s cubic-bezier(0.34,1.56,0.64,1) 0.31s both; }
    .service:nth-child(9)  .service-card { animation: kleff-in 0.50s cubic-bezier(0.34,1.56,0.64,1) 0.35s both; }
    .service:nth-child(10) .service-card { animation: kleff-in 0.50s cubic-bezier(0.34,1.56,0.64,1) 0.39s both; }

    /* ── Service name & description ── */
    .service-name {
      color: var(--text-hi) !important;
      font-size: 0.95rem !important;
      font-weight: 600 !important;
      letter-spacing: -0.01em !important;
    }
    .service-description {
      color: var(--text-lo) !important;
      font-size: 0.72rem !important;
    }

    /* ── Icon ── */
    .service-card:hover .service-icon img,
    .service-card:hover .service-icon svg {
      filter: drop-shadow(0 0 10px rgba(201,168,76,0.60)) brightness(1.10) !important;
      transition: filter 0.25s ease !important;
    }

    /* ── Widget stat cells — Apple number-first layout ── */
    .service-card dl {
      gap: 0.30rem !important;
    }
    .service-card dl > div {
      background: rgba(201,168,76,0.055) !important;
      border: 1px solid rgba(201,168,76,0.10) !important;
      border-radius: 12px !important;
      padding: 0.55rem 0.65rem !important;
      transition: background 0.20s !important;
      flex-direction: column-reverse !important;
      align-items: flex-start !important;
      gap: 0 !important;
    }
    .service-card:hover dl > div {
      background: rgba(201,168,76,0.09) !important;
    }

    /* Stat value — big, gold, Apple-weight */
    .service-card dl dt {
      color: var(--gold-bright) !important;
      font-size: 1.30rem !important;
      font-weight: 800 !important;
      line-height: 1.1 !important;
      letter-spacing: -0.02em !important;
    }
    /* Stat label — tiny, secondary */
    .service-card dl dd {
      color: var(--text-lo) !important;
      font-size: 0.60rem !important;
      font-weight: 600 !important;
      letter-spacing: 0.06em !important;
      text-transform: uppercase !important;
      line-height: 1.2 !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar       { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: rgba(10,8,4,0.4); }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.25); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.45); }

    /* ── Error state ── */
    [class*="bg-red-500"] {
      background: rgba(130,20,20,0.35) !important;
      border: 1px solid rgba(210,55,55,0.20) !important;
      backdrop-filter: blur(10px) !important;
      border-radius: 12px !important;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: networking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.12.3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "home.lan"
            - name: HOMEPAGE_VAR_QB_PASS
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: QB_PASS
            - name: HOMEPAGE_VAR_GRAFANA_PASS
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: GRAFANA_PASS
            - name: HOMEPAGE_VAR_OVERSEERR_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: OVERSEERR_KEY
            - name: HOMEPAGE_VAR_RADARR_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: RADARR_KEY
            - name: HOMEPAGE_VAR_SONARR_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: SONARR_KEY
            - name: HOMEPAGE_VAR_PROWLARR_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: PROWLARR_KEY
            - name: HOMEPAGE_VAR_SAB_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: SAB_KEY
            - name: HOMEPAGE_VAR_PLEX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homepage-secrets
                  key: PLEX_TOKEN
            - name: HOMEPAGE_VAR_ADGUARD_USER
              valueFrom:
                secretKeyRef:
                  name: adguard-auth
                  key: ADGUARD_USER
            - name: HOMEPAGE_VAR_ADGUARD_PASS
              valueFrom:
                secretKeyRef:
                  name: adguard-auth
                  key: ADGUARD_PASS
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
            - name: config
              mountPath: /app/config/services.yaml
              subPath: services.yaml
            - name: config
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
            - name: config
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
            - name: config
              mountPath: /app/config/docker.yaml
              subPath: docker.yaml
            - name: config
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
            - name: config
              mountPath: /app/config/custom.css
              subPath: custom.css
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: homepage-config
---
# Dashboard — accessible at https://home.lan (routed via Envoy Gateway)
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: networking
spec:
  type: ClusterIP
  selector:
    app: homepage
  ports:
    - port: 3000
      targetPort: 3000
