apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: networking
data:
  settings.yaml: |
    title: Homelab
    theme: dark
    color: slate
    cardBlur: sm
    headerStyle: clean
    hideVersion: true

  services.yaml: |
    - Media:
        - Plex:
            href: http://192.168.0.241:32400/web
            icon: plex.png
            description: Media Server
        - Overseerr:
            href: http://192.168.0.241:5055
            icon: overseerr.png
            description: Media Requests
            widget:
              type: overseerr
              url: http://192.168.0.241:5055
              key: "{{HOMEPAGE_VAR_OVERSEERR_KEY}}"
        - Radarr:
            href: http://192.168.0.241:7878
            icon: radarr.png
            description: Movies
            widget:
              type: radarr
              url: http://192.168.0.241:7878
              key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
        - Sonarr:
            href: http://192.168.0.241:8989
            icon: sonarr.png
            description: TV Shows
            widget:
              type: sonarr
              url: http://192.168.0.241:8989
              key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
        - Prowlarr:
            href: http://192.168.0.241:9696
            icon: prowlarr.png
            description: Indexers
            widget:
              type: prowlarr
              url: http://192.168.0.241:9696
              key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
        - qBittorrent:
            href: http://192.168.0.241:8080
            icon: qbittorrent.png
            description: Torrent Client (VPN)
            widget:
              type: qbittorrent
              url: http://192.168.0.241:8080
              username: admin
              password: "{{HOMEPAGE_VAR_QB_PASS}}"
        - SABnzbd:
            href: http://192.168.0.241:8090
            icon: sabnzbd.png
            description: Usenet Client
            widget:
              type: sabnzbd
              url: http://192.168.0.241:8090
              key: "{{HOMEPAGE_VAR_SAB_KEY}}"

    - Networking:
        - AdGuard Home:
            href: http://192.168.0.240
            icon: adguard-home.png
            description: DNS & Ad Blocker
        - Envoy Gateway:
            href: http://192.168.0.245
            icon: envoy.png
            description: Reverse Proxy

    - Monitoring:
        - Grafana:
            href: http://192.168.0.247:3000
            icon: grafana.png
            description: Metrics & Dashboards

    - Infrastructure:
        - ArgoCD:
            href: https://argocd.lan
            icon: argocd.png
            description: GitOps Deployments
        - TrueNAS:
            href: http://192.168.0.252
            icon: truenas.png
            description: NAS Storage
        - Portfolio:
            href: https://isaacwallace.dev
            icon: nextjs.png
            description: Personal Website

  widgets.yaml: |
    - search:
        provider: google
        target: _blank
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hour12: true

  bookmarks.yaml: |
    []

  docker.yaml: |
    {}

  kubernetes.yaml: |
    mode: disable
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: networking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "192.168.0.248"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
            - name: config
              mountPath: /app/config/services.yaml
              subPath: services.yaml
            - name: config
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
            - name: config
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
            - name: config
              mountPath: /app/config/docker.yaml
              subPath: docker.yaml
            - name: config
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: homepage-config
---
# Dashboard — replaces Homer at http://192.168.0.248
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: networking
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.248"
spec:
  type: LoadBalancer
  selector:
    app: homepage
  ports:
    - port: 80
      targetPort: 3000
