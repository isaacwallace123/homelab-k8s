apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      containers:
        - name: plex
          image: lscr.io/linuxserver/plex:1.43.1.10611-1e34174b1-ls304
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
            - name: VERSION
              value: docker
            - name: ADVERTISE_IP
              value: "http://192.168.0.241:32400/"
          ports:
            - containerPort: 32400
          readinessProbe:
            httpGet:
              path: /identity
              port: 32400
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /identity
              port: 32400
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config
            - name: movies
              mountPath: /movies
            - name: tv
              mountPath: /tv
            - name: dri
              mountPath: /dev/dri
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
              gpu.intel.com/i915: "1"
            limits:
              memory: 4Gi
              gpu.intel.com/i915: "1"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: config-plex
        - name: movies
          persistentVolumeClaim:
            claimName: tank-movies
        - name: tv
          persistentVolumeClaim:
            claimName: tank-tv
        - name: dri
          hostPath:
            path: /dev/dri
---
# Web UI — accessible at http://192.168.0.241:32400/web
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.241"
    metallb.io/allow-shared-ip: "media-stack"
spec:
  type: LoadBalancer
  selector:
    app: plex
  ports:
    - port: 32400
      targetPort: 32400
