apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      initContainers:
        - name: configure-proxy
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /config/qBittorrent
              CONFIG=/config/qBittorrent/qBittorrent.conf

              if ! grep -q '^\[Preferences\]' "$CONFIG" 2>/dev/null; then
                echo '[Preferences]' >> "$CONFIG"
              fi

              set_pref() {
                key="$1"; val="$2"
                if grep -q "^${key}=" "$CONFIG"; then
                  sed -i "s|^${key}=.*|${key}=${val}|" "$CONFIG"
                else
                  sed -i "/^\[Preferences\]/a ${key}=${val}" "$CONFIG"
                fi
              }

              set_pref 'Connection\\ProxyType' '2'
              set_pref 'Connection\\ProxyIp' 'gluetun-proxy.media.svc.cluster.local'
              set_pref 'Connection\\ProxyPort' '8388'
              set_pref 'Connection\\ProxyPeerConnections' 'true'
              echo "SOCKS5 proxy configured."
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: webui
            - containerPort: 6881
              name: torrent-tcp
            - containerPort: 6881
              name: torrent-udp
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: tank-config-qbittorrent
        - name: downloads
          persistentVolumeClaim:
            claimName: tank-downloads
---
# Web UI — accessible at http://192.168.0.241:8080
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.0.241"
    metallb.io/allow-shared-ip: "media-stack"
spec:
  type: LoadBalancer
  selector:
    app: qbittorrent
  ports:
    - port: 8080
      targetPort: 8080
      name: webui
