# ── Longhorn PVCs ─────────────────────────────────────────────────────────────
# postgres and redis use Longhorn instead of NFS to prevent data loss on pod
# restarts (NFS file locking / UID 999 permission issues cause reinit).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portfolio-postgres-data
  namespace: portfolio
  annotations:
    recurring-job-group.longhorn.io/default: enabled
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portfolio-redis-data
  namespace: portfolio
  annotations:
    recurring-job-group.longhorn.io/default: enabled
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: portfolio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        node-role.kubernetes.io/portfolio: "true"
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 15
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: portfolio-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: portfolio
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# ── Redis ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: portfolio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      nodeSelector:
        node-role.kubernetes.io/portfolio: "true"
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: portfolio-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: portfolio
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
# ── Infra Agent RBAC ──────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-agent
  namespace: portfolio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infra-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "namespaces", "services", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infra-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infra-agent
subjects:
  - kind: ServiceAccount
    name: infra-agent
    namespace: portfolio
---
# ── Infra Agent ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-agent
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infra-agent
  template:
    metadata:
      labels:
        app: infra-agent
    spec:
      serviceAccountName: infra-agent
      nodeSelector:
        node-role.kubernetes.io/portfolio: "true"
      containers:
        - name: infra-agent
          image: ghcr.io/isaacwallace123/portfolio-infra:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: INFRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: INFRA_API_KEY
            - name: PROMETHEUS_URL
              value: "http://prometheus.monitoring.svc.cluster.local:9090"
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"
            - name: OVERWATCH_URL
              value: "http://overwatch.cortex.svc.cluster.local:8000"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: infra-agent
  namespace: portfolio
spec:
  selector:
    app: infra-agent
  ports:
    - port: 8080
      targetPort: 8080
---
# ── Frontend ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        node-role.kubernetes.io/portfolio: "true"
      initContainers:
        - name: seed-uploads
          image: ghcr.io/isaacwallace123/portfolio-frontend:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              if [ ! -f /uploads/icons/placeholder.png ]; then
                mkdir -p /uploads/icons
                cp -rn /app/public/uploads/. /uploads/
                echo "Seeded uploads from image"
              fi
          volumeMounts:
            - name: uploads
              mountPath: /uploads
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: frontend
          image: ghcr.io/isaacwallace123/portfolio-frontend:latest
          imagePullPolicy: Always
          command: ["sh", "-c"]
          args:
            - |
              sed -i '/chown -R nextjs:nodejs/s/$/ 2>\/dev\/null || true/' ./docker-entrypoint.sh
              exec ./docker-entrypoint.sh
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: DATABASE_URL
            - name: NEXTAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: NEXTAUTH_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: NEXTAUTH_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: ENCRYPTION_KEY
            - name: SESSION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: SESSION_PASSWORD
            - name: HASH_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: HASH_ENCRYPTION_KEY
            - name: ADMIN_PASSWORD_HASH_ENCRYPTED
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: ADMIN_PASSWORD_HASH_ENCRYPTED
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: ADMIN_EMAIL
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: RESEND_API_KEY
            - name: CONTACT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: CONTACT_EMAIL
            - name: DEEPL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: DEEPL_API_KEY
            - name: MINIO_ENDPOINT
              value: "http://minio.portfolio.svc.cluster.local:9000"
            - name: MINIO_BUCKET
              value: "portfolio-images"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-minio-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-minio-secret
                  key: MINIO_SECRET_KEY
            - name: INFRA_API_URL
              value: "http://infra-agent:8080"
            - name: INFRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: INFRA_API_KEY
            - name: NODE_ENV
              value: "production"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/public/uploads
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1500m
              memory: 1Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: tank-portfolio-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: portfolio
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
---
# ── Ingress ───────────────────────────────────────────────────────────────────
# HTTP only — external TLS is handled by Cloudflare Tunnel (cloudflared pod)
# Local access: add DNS override in AdGuard: isaacwallace.dev → 192.168.0.245
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portfolio
  namespace: portfolio
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
      namespace: networking
      sectionName: http
  hostnames:
    - isaacwallace.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          port: 3000
          weight: 1
